<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClash订阅附加规则器</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/vs2015.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:var(--text2);cursor:pointer}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#515862;
  --text:#e6edf3;--text2:#8b949e;--text3:#a9a9a9;--text4:#47fcd4;
  --accent:#58a6ff;--accent2:#1f6feb;--accent-bg:rgba(88,166,255,0.1);
  --green:#3fb950;--green-bg:rgba(63,185,80,0.1);
  --red:#f85149;--red-bg:rgba(248,81,73,0.1);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,0.1);
  --radius:8px;--radius-lg:12px;
}

/* ============================================================
   布局骨架
   ============================================================ */
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px;min-height:100vh}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;max-width:100%;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:20px;height:56px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-0.3px}
.logo-ver{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.main{display:grid;grid-template-columns:minmax(250px,25%) minmax(300px,1fr) minmax(280px,30%);overflow:hidden;height:100%}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}

/* ============================================================
   [复用基类 1] 顶栏 — .panel-header 与 .fs-header 共用
   原来两段声明有 7 条完全相同的规则, 现在合并到 .bar-header, 
   各自只保留真正不同的部分。
   ============================================================ */
.bar-header{padding:0 18px;height:42px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
/* panel-header 无差异, 直接复用 */
.panel-header{composes:bar-header}
/* fs-header 覆盖差异：更大内边距、高度自适应 */
.fs-header{padding:12px 20px;height:auto;}

.panel-title{font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}

.chip{font-size:11px;padding:1px 7px;border-radius:20px;font-family:'IBM Plex Mono',monospace;background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--chip-color);}
/* .badge 复用 chip, 同时保留原来的通用灰色默认值 */
.badge{--chip-bg:var(--bg3);--chip-border:var(--border);--chip-color:var(--text2);}
.badge,.chip{font-size:11px;padding:1px 7px;border-radius:20px;font-family:'IBM Plex Mono',monospace;background:var(--chip-bg,var(--bg3));border:1px solid var(--chip-border,var(--border));color:var(--chip-color,var(--text2))}
.badge.green{--chip-bg:var(--green-bg);--chip-border:rgba(63,185,80,0.3);--chip-color:var(--green)}

.panel-body{flex:1;overflow-y:auto;padding:14px}

/* ============================================================
   输入面板
   ============================================================ */
.input-section{margin-bottom:16px}
.input-label{font-size:14px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.input-row{display:flex;gap:8px}
.inp{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;border-radius:var(--radius);outline:none;transition:border-color 0.15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
textarea.inp{display:block;width:100%;height:80px;font-size:11.5px;resize:vertical;margin:0}

/* ============================================================
   按钮基础
   ============================================================ */
.btn{padding:8px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:#388bfd}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border2)}
.btn-sm{padding:5px 10px}

.btn-semantic{background:var(--btn-bg);color:var(--btn-color);border:1px solid var(--btn-border);}
.btn-copy{--btn-bg:var(--bg3);--btn-color:var(--text);--btn-border:var(--border);}
.btn-copy:hover{background:var(--bg4)}
.btn-dl{--btn-bg:var(--green-bg);--btn-color:var(--green);--btn-border:rgba(63,185,80,0.3);}
.btn-dl:hover{--btn-bg:rgba(63,185,80,0.2)}
.btn-clear{--btn-bg:var(--red-bg);--btn-color:var(--red);--btn-border:rgba(248,81,73,0.3);}
.btn-clear:hover{--btn-bg:rgba(248,81,73,0.2)}
/* 让三个语义按钮继承基类 */
.btn-copy,.btn-dl,.btn-clear{background:var(--btn-bg);color:var(--btn-color);border:1px solid var(--btn-border)}

/* ============================================================
   状态栏
   ============================================================ */
.status-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;transition:border-color 0.3s,background 0.3s,box-shadow 0.3s}
@keyframes statusPulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:0.4}100%{transform:scale(1);opacity:1}}
@keyframes statusFlash{0%{box-shadow:0 0 0 0 transparent}30%{box-shadow:0 0 12px 2px var(--flash-color)}100%{box-shadow:0 0 0 0 transparent}}
.status-bar.flash .status-dot{animation:statusPulse 0.6s ease}
.status-bar.flash{animation:statusFlash 0.6s ease}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-bar.info .status-dot{background:var(--accent)}
.status-bar.success .status-dot{background:var(--green)}
.status-bar.error .status-dot{background:var(--red)}
.status-bar.success{border-color:rgba(63,185,80,0.3);background:var(--green-bg)}
.status-bar.error{border-color:rgba(248,81,73,0.3);background:var(--red-bg)}

/* ============================================================
   节点列表
   ============================================================ */
.node-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--radius);margin-bottom:3px;background:var(--bg2);border:1px solid var(--border);transition:border-color 0.1s}
.node-item:hover{border-color:#6cacff}
.node-flag{font-size:13px;flex-shrink:0;width:20px;text-align:center}
.node-name{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* node-tag 复用 chip 变量体系 */
.node-tag{font-size:10px;padding:1px 5px;border-radius:4px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--chip-color)}
.tag-hk{--chip-bg:rgba(255,179,128,0.15);--chip-border:rgba(255,179,128,0.3);--chip-color:#ffb380}
.tag-tw,.tag-eu{--chip-bg:rgba(88,166,255,0.15);--chip-border:rgba(88,166,255,0.3);--chip-color:#58a6ff}
.tag-sg,.tag-kr{--chip-bg:rgba(63,185,80,0.15);--chip-border:rgba(63,185,80,0.3);--chip-color:#3fb950}
.tag-jp{--chip-bg:rgba(188,140,255,0.15);--chip-border:rgba(188,140,255,0.3);--chip-color:#bc8cff}
.tag-us{--chip-bg:rgba(210,153,34,0.15);--chip-border:rgba(210,153,34,0.3);--chip-color:#d29922}
.tag-other{--chip-bg:var(--bg3);--chip-border:var(--border);--chip-color:var(--text3)}

/* ============================================================
   代理组配置面板
   ============================================================ */
.group-item{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2)}
.group-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:background 0.1s}
.group-header:hover{background:var(--bg3)}
.group-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.group-name{flex:1;font-weight:500}

/* group-type-badge 复用 chip 变量 */
.group-type-badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:4px;flex-shrink:0;background:var(--chip-bg);color:var(--chip-color);border:1px solid var(--chip-border)}
.type-select{--chip-bg:var(--accent-bg);--chip-color:var(--accent);--chip-border:rgba(88,166,255,0.3)}
.type-urltest{--chip-bg:var(--green-bg);--chip-color:var(--green);--chip-border:rgba(63,185,80,0.3)}
.type-country{--chip-bg:var(--purple-bg);--chip-color:var(--purple);--chip-border:rgba(188,140,255,0.3)}

.chevron{width:16px;height:16px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.group-content{border-top:1px solid var(--border)}
.group-content-inner{padding:10px 14px}
.proxy-option{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background 0.1s}
.proxy-option:hover{background:var(--bg3)}
.proxy-option input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.proxy-option label{font-size:12px;cursor:pointer;color:var(--text2);flex:1}
.proxy-option label:hover{color:var(--text)}
.select-all-row{padding:6px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.select-all-row label{font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.group-info{padding:8px 14px 10px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.info-icon{opacity:0.6}

/* ============================================================
   代码面板
   .output-code 与 .fs-code 字体、行高、padding、overflow 完全相同, 
   提取到 .code-pane, 各自只保留真正不同的部分。
   ============================================================ */
.code-pane{overflow:auto;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.6;background:transparent;}
.code-pane>code{display:block;white-space:pre;tab-size:2}
/* output-code 额外占满剩余高度 */
.output-code{flex:1}
/* fs-code 无额外差异, 直接复用 .code-pane 即可 */

/* ============================================================
   输出面板工具栏
   ============================================================ */
.output-toolbar{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ============================================================
   统计卡片
   ============================================================ */
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;text-align:center}
.stat-num{font-size:18px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ============================================================
   辅助
   ============================================================ */
.divider{height:1px;background:var(--border);margin:12px 0}

/* ============================================================
   全屏弹层 & 中央弹窗
   弹层标题栏复用 .bar-header(已在上方定义)
   ============================================================ */
.fs-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column}
.fs-overlay.active{display:flex}
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}

/* ============================================================
   highlight.js — 融入深色主题
   ============================================================ */
pre code.hljs{display:block;overflow:visible}

/* ============================================================
   响应式
   ============================================================ */
@media(max-width:900px){
  .main{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;height:auto}
  .panel:nth-child(3){border-top:1px solid var(--border);grid-column:1 / -1;width:100%}
}
@media(max-width:600px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto;overflow:visible}
  .panel{border-right:none;border-bottom:1px solid var(--border);width:100%;flex:none}
  .panel-body{overflow:visible;height:auto}
  .app{height:auto;overflow:visible}
  .output-code{height:250px;overflow:auto}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-text">OpenClash订阅附加规则器</div>
    </div>
    <span class="logo-ver">v2.0</span>
  </div>
  <div class="main">
    <!-- Panel 1: Input + Node List -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📡 订阅源</div>
        <span id="nodeCount" class="badge">0 节点</span>
      </div>
      <div class="panel-body">
        <div class="input-section">
          <div class="input-label">订阅链接</div>
          <div class="input-row" style="gap:6px">
            <input class="inp" type="text" id="urlInput" placeholder="https://sub.example.com/api?token=xxx">
            <button class="btn btn-primary btn-sm" id="fetchBtn">获取</button>
          </div>
        </div>
        <div class="input-section">
          <div class="input-label">手动粘贴 YAML 内容</div>
          <textarea class="inp" id="manualInput" placeholder="直接粘贴 Clash 订阅内容..."></textarea>
          <button class="btn btn-secondary btn-sm" style="margin-top:6px;width:100%" id="useManualBtn">使用此内容</button>
        </div>
        <div id="status" class="status-bar info">
          <div class="status-dot"></div>
          <span>等待输入订阅链接或粘贴内容</span>
        </div>
        <div id="statsRow" class="stats-row" style="display:none">
          <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总节点</div></div>
          <div class="stat-card"><div class="stat-num" id="statCountries">0</div><div class="stat-label">国家</div></div>
          <div class="stat-card"><div class="stat-num" id="statGroups">0</div><div class="stat-label">代理组</div></div>
        </div>
        <div class="divider" style="margin:8px 0"></div>
        <button class="btn btn-secondary btn-sm" style="width:100%;display:none" id="viewNodesBtn">📋 查看节点列表</button>
      </div>
    </div>

    <!-- Panel 2: Group Config -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🎯 代理组配置</div>
        <span id="groupCount" class="badge">0 组</span>
      </div>
      <div class="panel-body" id="groupConfigArea"></div>
    </div>

    <!-- Panel 3: Output -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📄 生成配置</div>
      </div>
      <div class="output-toolbar">
        <button class="btn btn-primary btn-sm" id="generateBtn">⚡ 生成配置</button>
        <button class="btn btn-copy btn-sm" id="copyBtn">📋 复制</button>
        <button class="btn btn-dl btn-sm" id="dlBtn">💾 下载</button>
        <button class="btn btn-clear btn-sm" id="clearBtn">🗑 清空</button>
        <button class="btn btn-secondary btn-sm" id="fullscreenBtn" style="margin-left:auto">⛶ 全屏</button>
      </div>
      <pre class="output-code" style="margin:0"><code id="outputCode" class="language-yaml" style="color:var(--text3);font-style:italic">等待处理...</code></pre>
    </div>
  </div>
</div>

<!-- Fullscreen Overlay -->
<div class="fs-overlay" id="fsOverlay">
  <div class="fs-header">
    <span class="fs-title">📄 生成配置 — 全屏查看</span>
    <button class="btn btn-secondary btn-sm" id="fsCloseBtn">✕ 关闭</button>
  </div>
  <pre class="fs-code" style="margin:0"><code id="fsCode" class="language-yaml"></code></pre>
</div>

<!-- Node List Modal -->
<div class="modal-overlay" id="nodeOverlay">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="fs-header">
      <span class="fs-title">📋 节点列表</span>
      <button class="btn btn-secondary btn-sm" id="nodeCloseBtn">✕ 关闭</button>
    </div>
    <div class="fs-code" id="nodeListOverlay"></div>
  </div>
</div>

<script>
const FIXED_HEADER = `port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
ipv6: false
bind-address: '*'
log-level: info
external-controller: '127.0.0.1:9090'
unified-delay: true
tcp-concurrent: true
# 认证配置
skip-auth-prefixes:
  - 192.168.1.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8
dns:
    enable: true
    ipv6: false
    follow-rule: false
    respect-rules: true
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: false
    use-system-hosts: false
    default-nameserver:
      - 119.29.29.29
      - 180.184.1.1
      - 223.5.5.5
    proxy-server-nameserver: ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    nameserver: [119.29.29.29,223.5.5.5]
    fallback: ['https://cloudflare-dns.com/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    fallback-filter: { geoip: true, geoip-code: CN, geosite: [gfw] }
    fake-ip-filter:
      - +.lan
      - +.local
      - geosite:cn
      - geosite:Private
      - time.*.com
      - ntp.*.com
      - +.miwifi.com
      - +.docker.io
      - +.market.xiaomi.com
      - +.push.apple.com
`;

const RULE_PROVIDERS = `rule-providers:
  private:
    url: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.yaml
    path: ./ruleset/Private_local.yaml

    format: yaml
    type: http
  cn_domain:
    url: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/cn.yaml

    interval: 86400

    path: ./ruleset/Adobe_local.yaml
    behavior: classical
    interval: 86400
    type: http
  telegram:

    path: ./ruleset/telegram_local.yaml
    behavior: classical
    interval: 86400
    format: yaml

  geolocation-!cn:

  cn_ip:
    url: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.yaml
    path: ./ruleset/cn_ip_local.yaml
    behavior: ipcidr
    interval: 86400
    format: yaml
    type: http
  bing:

function getNodeCountry(name) {

function classifyNodes(nodes) {
  const normal = nodes.filter(n => !SPECIAL_KW.some(k => n.includes(k)));
  const countryMap = {};
  COUNTRY_RULES.forEach(r => { countryMap[r.name] = []; });
  normal.forEach(n => {
    const r = getNodeCountry(n);
    if (r) countryMap[r.name].push(n);
  });
  return { normal, countryMap };
}

  const { normal, countryMap } = classifyNodes(parsedNodeNames);
  const groupNames = DEFAULT_GROUPS.map(g => g.name);

  const groupsSection = "proxy-groups:\n" + DEFAULT_GROUPS.filter(group => {
      if (!group.isCountry) return true;
      return (countryMap[group.name] || []).filter(p => !groupNames.includes(p)).length > 0;
    }).map(group => {
    let list = [];
    if (group.name === "♻️自动选择") {
      list = buildSelectList(group.name, [...normal]);
    } else if (group.name === "🚀手动选择") {
      list = buildSelectList(group.name, [...normal, 'DIRECT']);
    } else if (group.isCountry) {
      list = (countryMap[group.name] || []).filter(p => !groupNames.includes(p));
    } else if (["AIGC","PikPak","PicHub","Telegram","Google","🐟漏网之鱼"].includes(group.name)) {
      list = buildSelectList(group.name, [...normal, 'DIRECT']);
    } else if (group.name === "Adobe" || group.name === "🛑ADblock") {
      list = ["REJECT","DIRECT"];

function parseSubscription(content) {
  const m = content.match(/proxies:\s*\n/);
  if (!m) throw new Error('未找到 proxies 字段');
  const start = m.index + m[0].length;
  const gm = content.match(/proxy-groups:\s*\n/);
  const end = gm ? gm.index : content.length;
  let section = content.substring(start, end);
  // 清理末尾可能残留的 proxy-groups: 或其他非节点内容
  section = section.replace(/\s*proxy-groups:.*$/i, '').trim();
  const proxies = [], names = [];
  const lines = section.split('\n');
  let cur = '', brace = 0, inP = false;
  for (const line of lines) {
    if (line.match(/^\s*-\s*\{/)) {
      if (inP && cur) { push(cur, proxies, names); }
      cur = line.trim(); brace = (line.match(/\{/g)||[]).length - (line.match(/\}/g)||[]).length; inP = true;
    } else if (inP) {
      cur += ' ' + line.trim();
      brace += (line.match(/\{/g)||[]).length - (line.match(/\}/g)||[]).length;
      if (brace === 0) { push(cur, proxies, names); cur = ''; inP = false; }
    }
  }
  if (inP && cur) push(cur, proxies, names);
  if (!names.length) throw new Error('未找到任何节点');
  return { nodeNames: names, proxies: proxies.map(p => '    ' + (p.startsWith('-') ? p : '- ' + p)) };
}

function push(proxy, proxies, names) {
  proxies.push(proxy);
  const m = proxy.match(/name:\s*['"]?([^,'"}]+)['"]?/);
  if (m) names.push(m[1].trim().replace(/^['"]|['"]$/g,''));
}

/**
 * 解析 hysteria2:// URI 格式的节点
 * hysteria2://password@server:port/?insecure=1&sni=xxx&mport=xxx#name
 */
function parseHysteria2Uri(uri) {
  try {
    // 格式: hysteria2://password@server:port/?params#name
    const match = uri.match(/^hysteria2:\/\/([^@]+)@([^:]+):(\d+)\/?\?(.*)#(.*)$/);
    if (!match) return null;

    const password = match[1];
    const server = match[2];
    const port = parseInt(match[3]);
    const params = match[4];
    const name = decodeURIComponent(match[5]);

    // 解析参数
    const paramMap = {};
    params.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k && v) paramMap[k] = v;
    });

    const node = {
      name: name,
      server: server,
      port: port,
      type: 'hysteria2',
      password: password,
      udp: true,
      'skip-cert-verify': paramMap.insecure === '1',
      sni: paramMap.sni || ''
    };

    // 处理 mport (端口范围)
    if (paramMap.mport) {
      node.ports = paramMap.mport;
      node.mport = paramMap.mport;
    }

    return node;
  } catch (e) {
    return null;
  }
}

/**
 * 解析 vless:// URI 格式的节点
 * vless://uuid@server:port?type=xxx&security=reality&...#name
 */
function parseVlessUri(uri) {
  try {
    // 格式: vless://uuid@server:port?params#name
    const match = uri.match(/^vless:\/\/([^@]+)@([^:]+):(\d+)\?(.*)#(.*)$/);
    if (!match) return null;

    const uuid = match[1];
    const server = match[2];
    const port = parseInt(match[3]);
    const params = match[4];
    const name = decodeURIComponent(match[5]);

    // 解析参数
    const paramMap = {};
    params.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k) paramMap[k] = v || '';
    });

    const node = {
      name: name,
      server: server,
      port: port,
      type: 'vless',
      uuid: uuid,
      udp: true,
      tls: paramMap.security === 'tls' || paramMap.security === 'reality',
      'skip-cert-verify': paramMap.insecure === '1' || false
    };

    // 处理 network/type
    if (paramMap.type) {
      node.network = paramMap.type;
    }

    // 处理 flow (xtls-rprx-vision)
    if (paramMap.flow) {
      node.flow = paramMap.flow;
    }

    // 处理 reality 参数
    if (paramMap.security === 'reality') {
      node['reality-opts'] = {
        publicKey: paramMap.pbk || '',
        shortId: paramMap.sid || ''
      };
      if (paramMap.sni) node.servername = paramMap.sni;
      if (paramMap.fp) node.client_fingerprint = paramMap.fp;
    } else if (paramMap.sni) {
      node.sni = paramMap.sni;
    }

    // 处理 ws 参数
    if (paramMap.type === 'ws' && paramMap.path) {
      node.ws_opts = { path: paramMap.path };
      if (paramMap.host) node.ws_opts.headers = { Host: paramMap.host };
    }

    return node;
  } catch (e) {
    return null;
  }
}

/**
 * 将节点对象转换为 Clash YAML 行格式
 */
function nodeToYamlLine(node) {
  // 特殊处理: name 中包含特殊字符时需要用引号包裹
  const needQuote = /[\s|—？🚀♻️倍流媒体\u4e00-\u9fa5:]/.test(node.name);
  const nameStr = needQuote ? `'${node.name}'` : node.name;

  // 构建属性列表
  const props = [`name: ${nameStr}`, `server: ${node.server}`, `port: ${node.port}`, `type: ${node.type}`];

  // hysteria2 特有字段
  if (node.type === 'hysteria2') {
    props.push(`password: ${node.password}`);
    if (node.ports) props.push(`ports: ${node.ports}`);
    if (node.mport) props.push(`mport: ${node.mport}`);
  }

  // vless 特有字段
  if (node.type === 'vless') {
    props.push(`uuid: ${node.uuid}`);
    if (node.flow) props.push(`flow: ${node.flow}`);
    if (node.network) props.push(`network: ${node.network}`);
    if (node['reality-opts']) {
      props.push(`reality-opts: { public-key: '${node['reality-opts'].publicKey}', short-id: '${node['reality-opts'].shortId}' }`);
    }
    if (node.ws_opts) {
      const wsPath = node.ws_opts.path;
      props.push(`ws-opts: { path: '${wsPath}' }`);
    }
    if (node.client_fingerprint) props.push(`client-fingerprint: ${node.client_fingerprint}`);
    if (node.servername) props.push(`servername: ${node.servername}`);
  }

  // 公共字段
  props.push(`udp: ${node.udp}`);
  if (node['skip-cert-verify']) props.push(`skip-cert-verify: true`);
  if (node.sni) props.push(`sni: ${node.sni}`);
  if (node.tls) props.push(`tls: true`);

  return `    - { ${props.join(', ')} }`;
}

/**
 * 从 URI 链接列表解析节点
 * 支持 hysteria2:// 和 vless:// 格式
 */
function parseUriLinks(content) {
  const lines = content.split(/\r?\n/).filter(l => l.trim());
  const proxies = [];
  const names = [];

  for (const line of lines) {
    const trimmed = line.trim();

    if (trimmed.startsWith('hysteria2://')) {
      const node = parseHysteria2Uri(trimmed);
      if (node) {
        proxies.push(nodeToYamlLine(node));
        names.push(node.name);
      }
    } else if (trimmed.startsWith('vless://')) {
      const node = parseVlessUri(trimmed);
      if (node) {
        proxies.push(nodeToYamlLine(node));
        names.push(node.name);
      }
    }
  }

  return { nodeNames: names, proxies };
}

function processContent(content) {
  try {
    // 先检测是否是 base64 编码的内容
    let text = content;
    const trimmed = text.trim();
    const isBase64 = !trimmed.includes('\n') && !trimmed.includes('proxies:') && /^[A-Za-z0-9+/=\s]+$/.test(trimmed);

    if (isBase64) {
      try {
        const decoded = atob(trimmed.replace(/\s/g, ''));
        text = decoded;
      } catch(e) {}
    }

    // 检测解码后的内容是否包含 URI 格式的节点链接
    const hasHysteria2 = text.includes('hysteria2://');
    const hasVless = text.includes('vless://');

    if (hasHysteria2 || hasVless) {
      // 尝试解析 URI 格式的节点
      const { nodeNames, proxies } = parseUriLinks(text);
      if (nodeNames.length > 0) {
        parsedNodeNames = nodeNames;
        parsedProxies = proxies;
        refreshActiveCountryGroups();
        setStatus(`解析成功 — 找到 ${nodeNames.length} 个 URI 格式节点`, 'success');
        renderNodeList();
        renderGroupConfig();
        updateOutput();
        return;
      }
    }

    // 尝试解析 Clash YAML 格式
    const { nodeNames, proxies } = parseSubscription(text);
    parsedNodeNames = nodeNames; parsedProxies = proxies;
    refreshActiveCountryGroups();
    setStatus(`解析成功 — 找到 ${nodeNames.length} 个节点`, 'success');
    renderNodeList(); renderGroupConfig(); updateOutput();
  } catch(e) {
    setStatus(e.message, 'error');
    parsedNodeNames = []; parsedProxies = [];
    activeCountryGroups.clear();
    renderNodeList();
    document.getElementById('outputCode').innerHTML = '<span style="color:var(--text3);font-style:italic">解析失败, 请检查订阅内容</span>';
  }
}

async function fetchFromUrl(url) {
  const proxyNames = ['gjken', 'allorigins', 'corsproxy', 'codetabs', 'cors-anywhere'];
  const proxyUrls = [
    `https://cors001.gjken.workers.dev/?url=${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    `https://cors-anywhere.herokuapp.com/${url}`
  ];
  const errors = [];
  for (let i = 0; i < proxyUrls.length; i++) {
    const proxyName = proxyNames[i];
    setStatus(`正在获取订阅内容 (${i+1}/${proxyUrls.length})...`, 'info');
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(proxyUrls[i], { signal: ctrl.signal });
      clearTimeout(tid);
      if (res.ok) {
        let text = await res.text();
        processContent(text);
        return;
      } else {
        errors.push(`${proxyName}: HTTP ${res.status}`);
      }
    } catch(e) {
      errors.push(`${proxyName}: ${e.name === 'AbortError' ? '超时' : e.message}`);
    }
  }
  setStatus('获取失败 — ' + errors.join(' | ') + ', 请手动粘贴内容', 'error');
}

// 事件绑定
document.getElementById('fetchBtn').addEventListener('click', () => {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { setStatus('请输入订阅链接', 'error'); return; }
  fetchFromUrl(url);
});
document.getElementById('useManualBtn').addEventListener('click', () => {
  const c = document.getElementById('manualInput').value.trim();
  if (!c) { setStatus('请粘贴订阅内容', 'error'); return; }
  processContent(c);
});
document.getElementById('copyBtn').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(_lastRenderedConfig || generateConfig()); setStatus('已复制到剪贴板', 'success'); }
  catch(e) { setStatus('复制失败', 'error'); }
});
document.getElementById('dlBtn').addEventListener('click', () => {
  const b = new Blob([_lastRenderedConfig || generateConfig()], { type: 'text/yaml' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(b), download: 'config.yaml' });
  a.click(); URL.revokeObjectURL(a.href);
  setStatus('配置文件已下载', 'success');
});
document.getElementById('clearBtn').addEventListener('click', () => {
  parsedNodeNames = []; parsedProxies = [];
  _lastRenderedConfig = null; // 清空缓存, 确保下次生成时强制重新高亮
  const codeEl = document.getElementById('outputCode');
  codeEl.removeAttribute('data-highlighted');
  codeEl.className = 'language-yaml';
  codeEl.innerHTML = '<span style="color:var(--text3);font-style:italic">等待处理...</span>';
  renderNodeList(); setStatus('已清空', 'info');
});
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  // 直接复用已缓存的 raw 文本, 无需再次 generateConfig
  const raw = _lastRenderedConfig || generateConfig();
  const fsEl = document.getElementById('fsCode');
  const result = hljs.highlight(raw, { language: 'yaml' });
  fsEl.innerHTML = result.value;
  fsEl.dataset.highlighted = 'yes';
  document.getElementById('fsOverlay').classList.add('active');
});

// overlay 开关逻辑统一封装
function bindToggle(openId, closeId, overlayId) {
  document.getElementById(openId).addEventListener('click', () =>
    document.getElementById(overlayId).classList.add('active'));
  document.getElementById(closeId).addEventListener('click', () =>
    document.getElementById(overlayId).classList.remove('active'));
}
// fullscreenBtn open is handled separately above (needs hljs re-highlight)
document.getElementById('fsCloseBtn').addEventListener('click', () =>
  document.getElementById('fsOverlay').classList.remove('active'));
bindToggle('viewNodesBtn', 'nodeCloseBtn', 'nodeOverlay');

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('fsOverlay').classList.remove('active');
    document.getElementById('nodeOverlay').classList.remove('active');
  }
});

renderGroupConfig();

document.getElementById('generateBtn').addEventListener('click', () => {
  if (!parsedProxies.length) {
    setStatus('请先输入订阅链接或粘贴内容', 'error');
    return;
  }
  updateOutput();
  setStatus('配置已生成', 'success');
});
</script>
