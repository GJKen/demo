<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClash订阅附加规则器</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/vs2015.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
*::-webkit-scrollbar-thumb:hover{background:var(--text2);cursor:pointer}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#515862;
  --text:#e6edf3;--text2:#8b949e;--text3:#a9a9a9;--text4:#47fcd4;
  --accent:#58a6ff;--accent2:#1f6feb;--accent-bg:rgba(88,166,255,0.1);
  --green:#3fb950;--green-bg:rgba(63,185,80,0.1);
  --red:#f85149;--red-bg:rgba(248,81,73,0.1);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,0.1);
  --radius:8px;--radius-lg:12px;
}

/* ============================================================
   布局骨架
   ============================================================ */
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px;min-height:100vh}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;max-width:100%;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:20px;height:56px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-0.3px}
.logo-ver{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.main{display:grid;grid-template-columns:minmax(250px,25%) minmax(300px,1fr) minmax(280px,30%);overflow:hidden;height:100%}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}

/* ============================================================
   [复用基类 1] 顶栏 — .panel-header 与 .fs-header 共用 base
   分组选择器把共用规则一次性给到三个类(纯 CSS 不支持 composes,
   故直接列选择器); .fs-header 仅覆盖差异(更大内边距、高度自适应)。
   ============================================================ */
.bar-header,.panel-header,.fs-header{padding:0 18px;height:42px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.fs-header{padding:12px 20px;height:auto;}

.panel-title{font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}

/* .badge 用 chip-* 变量体系, 变量缺省时回退到通用灰色 */
.badge{font-size:11px;padding:1px 7px;border-radius:20px;font-family:'IBM Plex Mono',monospace;background:var(--chip-bg,var(--bg3));border:1px solid var(--chip-border,var(--border));color:var(--chip-color,var(--text2))}
.badge.green{--chip-bg:var(--green-bg);--chip-border:rgba(63,185,80,0.3);--chip-color:var(--green)}

.panel-body{flex:1;overflow-y:auto;padding:14px}

/* ============================================================
   输入面板
   ============================================================ */
.input-section{margin-bottom:16px}
.input-label{font-size:14px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.input-row{display:flex;gap:8px}
.url-row{margin-bottom:6px}
.manual-row{position:relative;margin-bottom:6px}
.manual-del{position:absolute;top:6px;right:6px;padding:2px 7px;z-index:2;opacity:0.85}
.row-del{flex:0 0 auto}
.inp{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;border-radius:var(--radius);outline:none;transition:border-color 0.15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
textarea.inp{display:block;width:100%;height:80px;font-size:11.5px;resize:vertical;margin:0}
textarea.inp::-webkit-resizer{background:linear-gradient(135deg,transparent 0 50%,var(--border2) 50% 62%,transparent 62% 68%,var(--text3) 68% 80%,transparent 80%);border-radius:0 0 var(--radius) 0}

/* ============================================================
   按钮基础
   ============================================================ */
.btn{padding:8px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:#388bfd}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border2)}
.btn-sm{padding:5px 10px}

.btn-copy{--btn-bg:var(--bg3);--btn-color:var(--text);--btn-border:var(--border);}
.btn-copy:hover{background:var(--bg4)}
.btn-dl{--btn-bg:var(--green-bg);--btn-color:var(--green);--btn-border:rgba(63,185,80,0.3);}
.btn-dl:hover{--btn-bg:rgba(63,185,80,0.2)}
.btn-clear{--btn-bg:var(--red-bg);--btn-color:var(--red);--btn-border:rgba(248,81,73,0.3);}
.btn-clear:hover{--btn-bg:rgba(248,81,73,0.2)}
/* 让三个语义按钮继承基类 */
.btn-copy,.btn-dl,.btn-clear{background:var(--btn-bg);color:var(--btn-color);border:1px solid var(--btn-border)}

/* ============================================================
   状态栏
   ============================================================ */
.status-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;transition:border-color 0.3s,background 0.3s,box-shadow 0.3s}
@keyframes statusPulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:0.4}100%{transform:scale(1);opacity:1}}
@keyframes statusFlash{0%{box-shadow:0 0 0 0 transparent}30%{box-shadow:0 0 12px 2px var(--flash-color)}100%{box-shadow:0 0 0 0 transparent}}
.status-bar.flash .status-dot{animation:statusPulse 0.6s ease}
.status-bar.flash{animation:statusFlash 0.6s ease}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-bar.info .status-dot{background:var(--accent)}
.status-bar.success .status-dot{background:var(--green)}
.status-bar.error .status-dot{background:var(--red)}
.status-bar.success{border-color:rgba(63,185,80,0.3);background:var(--green-bg)}
.status-bar.error{border-color:rgba(248,81,73,0.3);background:var(--red-bg)}

/* ============================================================
   节点列表
   ============================================================ */
.node-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--radius);margin-bottom:3px;background:var(--bg2);border:1px solid var(--border);transition:border-color 0.1s}
.node-item:hover{border-color:#6cacff}
.node-flag{font-size:13px;flex-shrink:0;width:20px;text-align:center}
.node-name{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* node-tag 复用 chip 变量体系 */
.node-tag{font-size:10px;padding:1px 5px;border-radius:4px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--chip-color)}
.tag-hk{--chip-bg:rgba(255,179,128,0.15);--chip-border:rgba(255,179,128,0.3);--chip-color:#ffb380}
.tag-tw,.tag-eu{--chip-bg:rgba(88,166,255,0.15);--chip-border:rgba(88,166,255,0.3);--chip-color:#58a6ff}
.tag-sg,.tag-kr{--chip-bg:rgba(63,185,80,0.15);--chip-border:rgba(63,185,80,0.3);--chip-color:#3fb950}
.tag-jp{--chip-bg:rgba(188,140,255,0.15);--chip-border:rgba(188,140,255,0.3);--chip-color:#bc8cff}
.tag-us{--chip-bg:rgba(210,153,34,0.15);--chip-border:rgba(210,153,34,0.3);--chip-color:#d29922}
.tag-other{--chip-bg:var(--bg3);--chip-border:var(--border);--chip-color:var(--text3)}

/* ============================================================
   代理组配置面板
   ============================================================ */
.group-item{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2)}
.group-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:background 0.1s}
.group-header:hover{background:var(--bg3)}
.group-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;line-height:1;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
.group-item.dragging{opacity:0.4}
.group-item.drag-over{border-top:2px solid var(--accent2)}
.group-name{flex:1;font-weight:500}

/* group-type-badge 复用 chip 变量 */
.group-type-badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:4px;flex-shrink:0;background:var(--chip-bg);color:var(--chip-color);border:1px solid var(--chip-border)}
.type-select{--chip-bg:var(--accent-bg);--chip-color:var(--accent);--chip-border:rgba(88,166,255,0.3)}
.type-urltest{--chip-bg:var(--green-bg);--chip-color:var(--green);--chip-border:rgba(63,185,80,0.3)}
.type-country{--chip-bg:var(--purple-bg);--chip-color:var(--purple);--chip-border:rgba(188,140,255,0.3)}

.chevron{width:16px;height:16px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.group-content{border-top:1px solid var(--border)}
.group-content-inner{padding:10px 14px}
.proxy-option{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background 0.1s}
.proxy-option:hover{background:var(--bg3)}
.proxy-option input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.proxy-option label{font-size:12px;cursor:pointer;color:var(--text2);flex:1}
.proxy-option label:hover{color:var(--text)}
.select-all-row{padding:6px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.select-all-row label{font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.group-info{padding:8px 14px 10px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.info-icon{opacity:0.6}

/* ============================================================
   代码面板
   .output-code 与 .fs-code 字体、行高、padding、overflow 完全相同,
   用分组选择器一次性给到两个类(纯 CSS 不支持 composes)。
   ============================================================ */
.output-code,.fs-code{overflow:auto;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.6;background:transparent;min-height:0}
.output-code>code,.fs-code>code{display:block;white-space:pre;tab-size:2}
/* output-code 额外占满剩余高度 */
.output-code{flex:1}

/* ============================================================
   输出面板工具栏
   ============================================================ */
.output-toolbar{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ============================================================
   统计卡片
   ============================================================ */
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;text-align:center}
.stat-num{font-size:18px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ============================================================
   辅助
   ============================================================ */
.divider{height:1px;background:var(--border);margin:12px 0}

/* ============================================================
   全屏弹层 & 中央弹窗
   弹层标题栏复用 .bar-header(已在上方定义)
   ============================================================ */
.fs-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column}
.fs-overlay.active{display:flex}
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}

/* ============================================================
   highlight.js — 融入深色主题
   ============================================================ */
pre code.hljs{display:block;overflow:visible}

/* ============================================================
   响应式
   ============================================================ */
@media(max-width:900px){
  .main{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;height:auto}
  .panel:nth-child(3){border-top:1px solid var(--border);grid-column:1 / -1;width:100%}
}
@media(max-width:600px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto;overflow:visible}
  .panel{border-right:none;border-bottom:1px solid var(--border);width:100%;flex:none}
  .panel-body{overflow:visible;height:auto}
  .app{height:auto;overflow:visible}
  .output-code{height:250px;overflow:auto}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-text">OpenClash订阅附加规则器</div>
    </div>
    <span class="logo-ver">v2.0</span>
  </div>
  <div class="main">
    <!-- Panel 1: Input + Node List -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📡 订阅源</div>
        <span id="nodeCount" class="badge">0 节点</span>
      </div>
      <div class="panel-body">
        <div class="input-section">
          <div class="input-label">订阅链接</div>
          <div id="urlRows">
            <div class="input-row url-row" style="gap:6px">
              <input class="inp url-input" type="text" placeholder="https://sub.example.com/api?token=xxx">
              <button class="btn btn-secondary btn-sm row-del" title="删除此行" style="display:none">✕</button>
            </div>
          </div>
          <button class="btn btn-secondary btn-sm" id="addUrlBtn" style="margin-top:6px;width:100%">➕ 追加链接</button>
        </div>
        <div class="input-section">
          <div class="input-label">手动粘贴 YAML 内容</div>
          <div id="manualRows">
            <div class="manual-row">
              <textarea class="inp manual-input" placeholder="直接粘贴 Clash 订阅内容..."></textarea>
              <button class="btn btn-secondary btn-sm row-del manual-del" title="删除此块" style="display:none">✕</button>
            </div>
          </div>
          <button class="btn btn-secondary btn-sm" id="addManualBtn" style="margin-top:6px;width:100%">➕ 追加粘贴框</button>
        </div>
        <button class="btn btn-primary btn-sm" id="fetchAllBtn" style="width:100%;margin-bottom:8px">🔄 获取全部并生成配置</button>
        <div id="status" class="status-bar info">
          <div class="status-dot"></div>
          <span>等待输入订阅链接或粘贴内容</span>
        </div>
        <div id="statsRow" class="stats-row" style="display:none">
          <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总节点</div></div>
          <div class="stat-card"><div class="stat-num" id="statCountries">0</div><div class="stat-label">国家</div></div>
          <div class="stat-card"><div class="stat-num" id="statGroups">0</div><div class="stat-label">代理组</div></div>
        </div>
        <div class="divider" style="margin:8px 0"></div>
        <button class="btn btn-secondary btn-sm" style="width:100%;display:none" id="viewNodesBtn">📋 查看节点列表</button>
      </div>
    </div>

    <!-- Panel 2: Group Config -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🎯 代理组配置</div>
        <span id="groupCount" class="badge">0 组</span>
      </div>
      <div class="panel-body" id="groupConfigArea"></div>
    </div>

    <!-- Panel 3: Output -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📄 生成配置</div>
      </div>
      <div class="output-toolbar">
        <button class="btn btn-primary btn-sm" id="generateBtn">⚡ 生成配置</button>
        <button class="btn btn-copy btn-sm" id="copyBtn">📋 复制</button>
        <button class="btn btn-dl btn-sm" id="dlBtn">💾 下载</button>
        <button class="btn btn-clear btn-sm" id="clearBtn">🗑 清空</button>
        <button class="btn btn-secondary btn-sm" id="fullscreenBtn" style="margin-left:auto">⛶ 全屏</button>
      </div>
      <pre class="output-code" style="margin:0"><code id="outputCode" class="language-yaml" style="color:var(--text3);font-style:italic">等待处理...</code></pre>
    </div>
  </div>
</div>

<!-- Fullscreen Overlay -->
<div class="fs-overlay" id="fsOverlay">
  <div class="fs-header">
    <span class="fs-title">📄 生成配置 — 全屏查看</span>
    <button class="btn btn-secondary btn-sm" id="fsCloseBtn">✕ 关闭</button>
  </div>
  <pre class="fs-code" style="margin:0"><code id="fsCode" class="language-yaml"></code></pre>
</div>

<!-- Node List Modal -->
<div class="modal-overlay" id="nodeOverlay">
  <div class="modal-box">
    <div class="fs-header">
      <span class="fs-title">📋 节点列表</span>
      <button class="btn btn-secondary btn-sm" id="nodeCloseBtn">✕ 关闭</button>
    </div>
    <div class="fs-code" id="nodeListOverlay"></div>
  </div>
</div>

<script>
const FIXED_HEADER = `---

const RULE_PROVIDERS = `rule-providers:
  private:
    url: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.yaml
    path: ./ruleset/Private_local.yaml

    path: ./ruleset/Google_local.yaml
    behavior: classical
    interval: 86400
    format: yaml
    type: http
  adobe:
    url: https://fastly.jsdelivr.net/gh/GJKen/clash-Rules@master/Rules/Adobe.yaml
    path: ./ruleset/Adobe_local.yaml
    behavior: classical
    interval: 86400
    type: http
  telegram:
    url: https://fastly.jsdelivr.net/gh/GJKen/clash-Rules@master/Rules/Telegram.yaml
    path: ./ruleset/telegram_local.yaml
    behavior: classical
    interval: 86400
    format: yaml

// 识别机场塞进订阅的"信息节点"(剩余流量 / 套餐到期 / 重置时间等), 它们不是真节点。
// 信息节点在 mergeNodes 阶段已被丢弃, 这里作为全局唯一判定来源供各处复用。
const INFO_NODE_RE = /(剩余流量|套餐到期|距离下次重置|剩余[:：]|到期[:：]|过期|流量重置|官网|订阅|续费|重置剩余|流量：|GB$|expire|traffic|reset)/i;
function isInfoNode(name) {
  return INFO_NODE_RE.test(String(name || ''));
}

const GROUP_ORDER_KEY = 'sub_group_order_v1';
function saveGroupOrder() {
  try { localStorage.setItem(GROUP_ORDER_KEY, JSON.stringify(DEFAULT_GROUPS.map(g => g.name))); } catch(e) {}
}
function loadGroupOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem(GROUP_ORDER_KEY) || 'null');
    if (!Array.isArray(saved)) return;
    const byName = new Map(DEFAULT_GROUPS.map(g => [g.name, g]));
    const reordered = [];
    // 按保存的顺序还原
    saved.forEach(n => { if (byName.has(n)) { reordered.push(byName.get(n)); byName.delete(n); } });
    // 保存里没有的(新增组)按原顺序补到末尾
    DEFAULT_GROUPS.forEach(g => { if (byName.has(g.name)) reordered.push(g); });
    DEFAULT_GROUPS.length = 0;
    DEFAULT_GROUPS.push(...reordered);
  } catch(e) {}
}

function getSelectableGroups(name) {
  return DEFAULT_GROUPS.filter(g =>
    g.name !== name && g.type === "url-test" && (!g.isCountry || activeCountryGroups.has(g.name))
  ).map(g => g.name);
}

function refreshActiveCountryGroups() {
  activeCountryGroups.clear();
  if (parsedNodeNames.length) {
    const { countryMap, others } = classifyNodes(parsedNodeNames);
    COUNTRY_RULES.forEach(r => {
      if (countryMap[r.name] && countryMap[r.name].length > 0) activeCountryGroups.add(r.name);
    });
    // 有未归类节点时激活🌐其他组
    const other = DEFAULT_GROUPS.find(g => g.isOther);
    if (other && others.length > 0) activeCountryGroups.add(other.name);
  }
  // 更新每个 canSelect 组的可选列表, 并自动选中所有活跃的 url-test 组
  DEFAULT_GROUPS.forEach(g => {
    if (!g.canSelect) return;
    const selectable = getSelectableGroups(g.name);
    // 移除不再可选的组, 添加新出现的可选组
    selectedGroups[g.name] = selectable;
  });
}

// 把名称按非字母数字切成大写 token, 用于短国家代码的精确匹配
// (避免 Singapore 子串含 'in' 被误判成印度等)
function nameTokens(name) {
  return name.toUpperCase().split(/[^A-Z0-9]+/).filter(Boolean);
}

function getNodeCountry(name) {
  const lower = name.toLowerCase();
  const tokens = nameTokens(name);
  for (const r of COUNTRY_RULES) {
    for (const k of r.keywords) {
      // 2~3 个字母的纯 ASCII 代码(KR/US/HKG/LAX…)→ 整 token 比对, 大小写不敏感
      if (/^[A-Za-z]{2,3}$/.test(k)) {
        if (tokens.includes(k.toUpperCase())) return r;
      // 中文 / 国旗 emoji / 较长英文名 → 大小写不敏感子串匹配
      } else if (lower.includes(k.toLowerCase())) {
        return r;
      }
    }
  }
  return null;
}

function classifyNodes(nodes) {
  const normal = nodes.filter(n => !isInfoNode(n));
  const countryMap = {};
  COUNTRY_RULES.forEach(r => { countryMap[r.name] = []; });
  const others = [];  // normal 里没匹配到任何国家的节点
  normal.forEach(n => {
    const r = getNodeCountry(n);
    if (r) countryMap[r.name].push(n);
    else others.push(n);
  });
  return { normal, countryMap, others };
}

// 抽取公共的"节点+代理组"列表构建逻辑
function buildSelectList(groupName, base) {
  const groupNames = DEFAULT_GROUPS.map(g => g.name);
  return [...base, ...(selectedGroups[groupName] || []).filter(g => groupNames.includes(g) && g !== groupName)];
}

function generateConfig() {
  if (!parsedProxies.length) {
    return FIXED_HEADER + "\n\nproxies: []\n\nproxy-groups:\n" +
      DEFAULT_GROUPS.map(g => `    - { name: ${g.name}, type: ${g.type}${g.url?`, url: ${g.url}`:''}, proxies: ['DIRECT'] }`).join('\n') +
      "\n\n" + RULE_PROVIDERS + "\n\n" + RULES;
  }
  const proxiesSection = "proxies:\n" + parsedProxies.join('\n');
  const { normal, countryMap, others } = classifyNodes(parsedNodeNames);
  const groupNames = DEFAULT_GROUPS.map(g => g.name);

  const groupsSection = "proxy-groups:\n" + DEFAULT_GROUPS.filter(group => {
      if (group.isOther) return others.length > 0;       // 🌐其他: 有未归类节点才输出
      if (!group.isCountry) return true;
      return (countryMap[group.name] || []).filter(p => !groupNames.includes(p)).length > 0;
    }).map(group => {
    let list = [];
    if (group.name === "♻️自动选择") {
      list = buildSelectList(group.name, [...normal]);
    } else if (group.name === "🚀手动选择") {
      list = buildSelectList(group.name, [...normal, 'DIRECT']);
    } else if (group.isOther) {
      list = others.filter(p => !groupNames.includes(p));
    } else if (group.isCountry) {
      list = (countryMap[group.name] || []).filter(p => !groupNames.includes(p));
    } else if (["AIGC","PikPak","PicHub","Telegram","Google","🐟漏网之鱼"].includes(group.name)) {
      // 应用分流组: 把🚀手动选择放在最前, 再接节点池 + DIRECT + 已勾选的代理组
      list = buildSelectList(group.name, ['🚀手动选择', ...normal, 'DIRECT']);
    } else if (group.name === "Adobe" || group.name === "🛑ADblock") {
      list = ["REJECT","DIRECT"];
    }
    list = [...new Set(list)];
    if (!list.length) list = ['DIRECT'];
    const ps = "[" + list.map(p => (p.match(/[\s|—？🚀♻️倍流媒体\u4e00-\u9fa5]/) ? `'${p}'` : p)).join(', ') + "]";
    return group.type === "url-test"
      ? `    - { name: ${group.name}, type: ${group.type}, url: ${group.url}, proxies: ${ps} }`
      : `    - { name: ${group.name}, type: ${group.type}, proxies: ${ps} }`;
  }).join('\n');

  return `${FIXED_HEADER}\n${proxiesSection}\n\n${groupsSection}\n\n${RULE_PROVIDERS}\n\n${RULES}`;
}

function updateOutput() {
  const raw = generateConfig();
  // 脏检查：内容未变则跳过所有 DOM 操作
  if (raw === _lastRenderedConfig) return;
  _lastRenderedConfig = raw;

  // 用 hljs.highlight 在离屏完成 tokenize, 再一次性写入 DOM
  const result = hljs.highlight(raw, { language: 'yaml' });
  const codeEl = document.getElementById('outputCode');
  codeEl.style.cssText = '';
  // 用 innerHTML 单次写入, 避免 removeAttribute + textContent + highlightElement 三次触发 reflow
  codeEl.innerHTML = result.value;
  codeEl.dataset.highlighted = 'yes';
}

  }).join('');
}

window.toggleDD = function(name) {
  dropdownOpen[name] = !dropdownOpen[name];
  renderGroupConfig();
};
window.updateSel = function(group, val, checked) {
  if (!selectedGroups[group]) selectedGroups[group] = [];
  if (checked) { if (!selectedGroups[group].includes(val)) selectedGroups[group].push(val); }
  else selectedGroups[group] = selectedGroups[group].filter(g => g !== val);
  refreshGroupBadges();
};
window.toggleAll = function(group) {
  const selectable = getSelectableGroups(group);
  const current = selectedGroups[group] || [];
  const allSel = selectable.length > 0 && selectable.every(g => current.includes(g));
  selectedGroups[group] = allSel ? [] : [...selectable];
  refreshGroupCheckboxes(group);
  refreshGroupBadges();
};

function refreshGroupCheckboxes(group) {
  const gid = DEFAULT_GROUPS.findIndex(g => g.name === group);
  if (gid < 0) return;
  const selectable = getSelectableGroups(group);
  const current = selectedGroups[group] || [];
  const allSel = selectable.length > 0 && selectable.every(g => current.includes(g));
  const saEl = document.getElementById('sa_' + gid);
  if (saEl) saEl.checked = allSel;
  selectable.forEach((g, i) => {
    const el = document.getElementById('c_' + gid + '_' + i);
    if (el) el.checked = current.includes(g);
  });
}

function refreshGroupBadges() {
  DEFAULT_GROUPS.forEach((group, gid) => {
    if (!group.canSelect) return;
    const current = selectedGroups[group.name] || [];
    const header = document.querySelectorAll('.group-item')[gid]?.querySelector('.group-header');
    if (!header) return;
    let badge = header.querySelector('.badge');
    if (current.length > 0) {
      if (badge) {
        badge.textContent = '+' + current.length;
      } else {
        badge = document.createElement('span');
        badge.className = 'badge';
        badge.style.cssText = 'margin-left:auto;margin-right:6px;font-size:10px;color:var(--text4)';
        badge.textContent = '+' + current.length;
        const typeBadge = header.querySelector('.group-type-badge');
        if (typeBadge) header.insertBefore(badge, typeBadge);
      }
    } else if (badge) {
      badge.remove();
    }
  });
}

function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.className = `status-bar ${type}`;
  el.innerHTML = `<div class="status-dot"></div><span>${msg}</span>`;
  // 触发闪烁动画

  el.style.setProperty('--flash-color', flashColor);
  el.classList.remove('flash');
  void el.offsetWidth; // 强制重排以重新触发动画
  el.classList.add('flash');
}

function parseSubscription(content) {
  const m = content.match(/^proxies:\s*$/m);
  if (!m) throw new Error('未找到 proxies 字段');
  const start = m.index + m[0].length;
  const rest = content.substring(start);
  const endMatch = rest.match(/^\S[\w-]*:\s*$/m);
  let section = endMatch ? rest.substring(0, endMatch.index) : rest;
  section = section.trim();
  const blocks = splitProxyBlocks(section);
  const proxies = [], names = [];
  blocks.forEach(block => {
    const normalized = normalizeProxyBlock(block);
    const name = getProxyName(normalized);
    if (!name) return;
    proxies.push(normalized);
    names.push(name);
  });
  if (!names.length) throw new Error('未找到任何节点');
  return { nodeNames: names, proxies };
}

function splitProxyBlocks(section) {
  const lines = section.split(/\r?\n/);
  const blocks = [];
  let cur = [];
  for (const line of lines) {
    if (/^\s*-\s+/.test(line)) {
      if (cur.length) blocks.push(cur.join('\n'));
      cur = [line];
    } else if (cur.length) {
      cur.push(line);
    }
  }
  if (cur.length) blocks.push(cur.join('\n'));
  return blocks;
}

function normalizeProxyBlock(block) {
  if (/^-\s*\{/.test(block.trim())) return blockMapToYaml(block.trim());
  // 保留嵌套字段(reality-opts / ws-opts 等)的相对缩进:
  // 以 body 行里最浅的缩进作为顶层字段基准,更深的子字段按相对偏移还原。
  const lines = block.split(/\r?\n/).filter(line => line.trim() !== '');
  const bodyIndents = lines.slice(1).map(line => line.match(/^(\s*)/)[1].length);
  const keyBase = bodyIndents.length ? Math.min(...bodyIndents) : 0;
  return lines.map((line, index) => {
    if (index === 0) return '    - ' + line.replace(/^\s*-\s*/, '');
    const indent = line.match(/^(\s*)/)[1].length;
    const rel = Math.max(0, indent - keyBase);
    return '      ' + ' '.repeat(rel) + line.trim();
  }).join('\n');
}

function blockMapToYaml(proxy) {
  const body = proxy.replace(/^-\s*\{|\}\s*$/g, '');
  const pairs = splitInlinePairs(body);
  const lines = [];
  pairs.forEach((part, index) => {
    const kv = part.match(/^([^:]+):\s*(.*)$/);
    if (!kv) return;
    const key = kv[1].trim();
    const value = kv[2].trim();
    lines.push(`${index === 0 ? '    -' : '     '} ${key}: ${value}`);
  });
  return lines.join('\n');
}

function splitInlinePairs(body) {
  const parts = [];
  let cur = '', quote = '', brace = 0, bracket = 0;
  for (let i = 0; i < body.length; i++) {
    const ch = body[i], prev = body[i - 1];
    if (quote) {
      cur += ch;
      if (ch === quote && prev !== '\\') quote = '';
      continue;
    }
    if (ch === '"' || ch === "'") { quote = ch; cur += ch; continue; }
    if (ch === '{') brace++;
    if (ch === '}') brace--;
    if (ch === '[') bracket++;
    if (ch === ']') bracket--;
    if (ch === ',' && brace === 0 && bracket === 0) {
      if (cur.trim()) parts.push(cur.trim());
      cur = '';
    } else {
      cur += ch;
    }
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

function getProxyName(proxy) {
  const m = proxy.match(/^\s*-\s*name:\s*(.+?)\s*$/m) || proxy.match(/\bname:\s*('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|[^,\n}]+)/);
  return m ? parseYamlScalar(m[1]) : '';
}

function parseYamlScalar(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (raw[0] === '"' && raw[raw.length - 1] === '"') {
    return decodeDoubleQuotedYaml(raw.slice(1, -1));
  }
  if (raw[0] === "'" && raw[raw.length - 1] === "'") {
    return raw.slice(1, -1).replace(/''/g, "'");
  }
  return raw.replace(/\s+#.*$/, '').trim();
}

function decodeDoubleQuotedYaml(text) {
  return text
    .replace(/\\U([0-9a-fA-F]{8})/g, (_, hex) => String.fromCodePoint(parseInt(hex, 16)))
    .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
    .replace(/\\([0abtnvfre"\\/])/g, (_, ch) => ({
      '0': '\0', a: '\x07', b: '\b', t: '\t', n: '\n', v: '\v', f: '\f', r: '\r', e: '\x1b',
      '"': '"', '\\': '\\', '/': '/'
    }[ch] || ch));
}

/**
 * 解析 hysteria2:// URI 格式的节点
 * hysteria2://password@server:port/?insecure=1&sni=xxx&mport=xxx#name
 */
function parseHysteria2Uri(uri) {
  try {
    // 格式: hysteria2://password@server:port/?params#name
    const match = uri.match(/^hysteria2:\/\/([^@]+)@([^:]+):(\d+)\/?\?(.*)#(.*)$/);
    if (!match) return null;

    const password = match[1];
    const server = match[2];
    const port = parseInt(match[3]);
    const params = match[4];
    const name = decodeURIComponent(match[5]);

    // 解析参数
    const paramMap = {};
    params.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k && v) paramMap[k] = v;
    });

    const node = {
      name: name,
      server: server,
      port: port,
      type: 'hysteria2',
      password: password,
      udp: true,
      // 机场普遍用伪造 SNI(www.bing.com 等) + 自签证书; Mihomo 无法像客户端那样
      // 用 pinSHA256 配伪造 SNI 校验自签证书, 故 insecure=1 或带 pinSHA256 时一律跳过校验,
      // 与机场自己的 sing-box(insecure=1)行为保持一致, 否则 TLS 握手必然失败。
      'skip-cert-verify': paramMap.insecure === '1' || paramMap.insecure === 'true' || !!paramMap.pinSHA256,
      sni: paramMap.sni || ''
    };

    // 处理 mport (端口跳跃范围) → Mihomo 用 ports 字段; mport 是非标准字段, 不输出
    if (paramMap.mport) {
      node.ports = paramMap.mport;
    }

    return node;
  } catch (e) {
    return null;
  }
}

/**
 * 解析 vless:// URI 格式的节点
 * vless://uuid@server:port?type=xxx&security=reality&...#name
 */
function parseVlessUri(uri) {
  try {
    // 格式: vless://uuid@server:port?params#name
    const match = uri.match(/^vless:\/\/([^@]+)@([^:]+):(\d+)\?(.*)#(.*)$/);
    if (!match) return null;

    const uuid = match[1];
    const server = match[2];
    const port = parseInt(match[3]);
    const params = match[4];
    const name = decodeURIComponent(match[5]);

    // 解析参数
    const paramMap = {};
    params.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k) paramMap[k] = v || '';
    });

    const node = {
      name: name,
      server: server,
      port: port,
      type: 'vless',
      uuid: uuid,
      udp: true,
      tls: paramMap.security === 'tls' || paramMap.security === 'reality',
      'skip-cert-verify': paramMap.insecure === '1' || false
    };

    // 处理 network/type
    if (paramMap.type) {
      node.network = paramMap.type;
    }

    // 处理 flow (xtls-rprx-vision)
    if (paramMap.flow) {
      node.flow = paramMap.flow;
    }

    // 处理 reality 参数
    if (paramMap.security === 'reality') {
      node['reality-opts'] = {
        publicKey: paramMap.pbk || '',
        shortId: paramMap.sid || ''
      };
      if (paramMap.sni) node.servername = paramMap.sni;
      if (paramMap.fp) node.client_fingerprint = paramMap.fp;
    } else if (paramMap.security === 'tls') {
      // vless+tls 的 TLS 域名要用 servername(不是 sni), 否则对着 IP 校验证书会失败
      if (paramMap.sni) node.servername = paramMap.sni;
      if (paramMap.fp) node.client_fingerprint = paramMap.fp;
    } else if (paramMap.sni) {
      node.sni = paramMap.sni;
    }

    // 处理 ws 参数: path 必须 URL 解码(原始是 %2F... , Clash 需要真实路径 /...)
    if (paramMap.type === 'ws' && paramMap.path) {
      let wsPath = paramMap.path;
      try { wsPath = decodeURIComponent(wsPath); } catch (e) {}
      node.ws_opts = { path: wsPath };
      if (paramMap.host) node.ws_opts.headers = { Host: paramMap.host };
    }

    // 处理 packetEncoding(xudp)
    if (paramMap.packetEncoding) {
      node['packet-encoding'] = paramMap.packetEncoding;
    }

    return node;
  } catch (e) {
    return null;
  }
}

/**
 * 将节点对象转换为 Clash YAML 块格式
 */
function nodeToYamlLine(node) {
  const lines = [
    `    - name: ${formatYamlScalar(node.name)}`,
    `      type: ${formatYamlScalar(node.type)}`,
    `      server: ${formatYamlScalar(node.server)}`,
    `      port: ${node.port}`
  ];

  if (node.type === 'hysteria2') {
    if (node.ports) lines.push(`      ports: ${formatYamlScalar(node.ports)}`);
    if (node.mport) lines.push(`      mport: ${formatYamlScalar(node.mport)}`);
    lines.push(`      udp: ${!!node.udp}`);
    if (node['skip-cert-verify'] !== undefined) lines.push(`      skip-cert-verify: ${!!node['skip-cert-verify']}`);
    if (node.sni) lines.push(`      sni: ${formatYamlScalar(node.sni)}`);
    lines.push(`      password: ${formatYamlScalar(node.password)}`);
    return lines.join('\n');
  }

  if (node.type === 'vless') {
    lines.push(`      uuid: ${formatYamlScalar(node.uuid)}`);
    lines.push(`      udp: ${!!node.udp}`);
    if (node.flow) lines.push(`      flow: ${formatYamlScalar(node.flow)}`);
    if (node.tls !== undefined) lines.push(`      tls: ${!!node.tls}`);
    if (node['skip-cert-verify'] !== undefined) lines.push(`      skip-cert-verify: ${!!node['skip-cert-verify']}`);
    if (node.client_fingerprint) lines.push(`      client-fingerprint: ${formatYamlScalar(node.client_fingerprint)}`);
    if (node.servername) lines.push(`      servername: ${formatYamlScalar(node.servername)}`);
    if (node.sni && !node.servername) lines.push(`      sni: ${formatYamlScalar(node.sni)}`);
    if (node.network) lines.push(`      network: ${formatYamlScalar(node.network)}`);
    if (node.ws_opts) {
      lines.push('      ws-opts:');
      if (node.ws_opts.path) lines.push(`        path: ${formatYamlScalar(node.ws_opts.path)}`);
      if (node.ws_opts.headers && node.ws_opts.headers.Host) {
        lines.push('        headers:');
        lines.push(`          Host: ${formatYamlScalar(node.ws_opts.headers.Host)}`);
      }
    }
    if (node['reality-opts']) {
      lines.push('      reality-opts:');
      lines.push(`        public-key: ${formatYamlScalar(node['reality-opts'].publicKey)}`);
      lines.push(`        short-id: ${formatYamlScalar(node['reality-opts'].shortId)}`);
    }
    if (node['packet-encoding']) lines.push(`      packet-encoding: ${formatYamlScalar(node['packet-encoding'])}`);
    return lines.join('\n');
  }

  if (node.udp !== undefined) lines.push(`      udp: ${!!node.udp}`);
  if (node.tls !== undefined) lines.push(`      tls: ${!!node.tls}`);
  if (node['skip-cert-verify'] !== undefined) lines.push(`      skip-cert-verify: ${!!node['skip-cert-verify']}`);
  return lines.join('\n');
}

function formatYamlScalar(value) {
  const str = String(value ?? '');
  if (!str) return "''";
  if (/^[A-Za-z0-9._/@+-]+$/.test(str) && !/^(true|false|null|yes|no|on|off)$/i.test(str)) return str;
  return '"' + str
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

/**
 * 从 URI 链接列表解析节点
 * 支持 hysteria2:// 和 vless:// 格式
 */
function parseUriLinks(content) {
  const lines = content.split(/\r?\n/).filter(l => l.trim());
  const proxies = [];
  const names = [];

  for (const line of lines) {
    const trimmed = line.trim();

    if (trimmed.startsWith('hysteria2://')) {
      const node = parseHysteria2Uri(trimmed);
      if (node) {
        proxies.push(nodeToYamlLine(node));
        names.push(node.name);
      }
    } else if (trimmed.startsWith('vless://')) {
      const node = parseVlessUri(trimmed);
      if (node) {
        proxies.push(nodeToYamlLine(node));
        names.push(node.name);
      }
    }
  }

  return { nodeNames: names, proxies };
}

// 从节点 YAML 块中提取 server:port 作为去重键
function getProxyEndpoint(proxyBlock) {
  const s = proxyBlock.match(/^\s*-?\s*server:\s*(.+?)\s*$/m) || proxyBlock.match(/\bserver:\s*('[^']*'|"[^"]*"|[^,\n}]+)/);
  const p = proxyBlock.match(/^\s*-?\s*port:\s*(.+?)\s*$/m) || proxyBlock.match(/\bport:\s*('[^']*'|"[^"]*"|[^,\n}]+)/);
  const server = s ? parseYamlScalar(s[1]) : '';
  const port = p ? parseYamlScalar(p[1]) : '';
  return (server + ':' + port).toLowerCase();
}

// 按完整配置(忽略 name 行)生成去重键: 同一机场大量节点共用 server:port
// (CDN 中转 / 端口跳跃), 仅靠 server:port 去重会误杀真·不同节点; 改用整块比对,
// 只有连接参数完全一致(仅名字不同)的才视为重复。
function getProxyContentKey(proxyBlock) {
  return proxyBlock
    .split(/\r?\n/)
    .filter(line => !/^\s*-?\s*name:\s*/.test(line))
    .map(line => line.trim())
    .join('\n');
}

// 给节点重命名(改 YAML 块里的 name 字段 + 返回的显示名)
function renameProxy(proxyBlock, oldName, newName) {
  const oldEsc = oldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  // 块格式: "- name: xxx" 或 "name: xxx"; 支持带引号
  const re = new RegExp(`(name:\\s*)('(?:[^'\\\\]|\\\\.)*'|"(?:[^"\\\\]|\\\\.)*"|${oldEsc})`);
  return proxyBlock.replace(re, (_, prefix) => prefix + formatYamlScalar(newName));
}

// 合并新解析出的节点到全局池: 按完整配置去重 + 丢弃信息节点, 名称冲突自动加后缀
function mergeNodes(nodeNames, proxies) {
  const existingKeys = new Set(parsedProxies.map(getProxyContentKey));
  const existingNames = new Set(parsedNodeNames);
  let added = 0, skipped = 0, renamed = 0, infoSkipped = 0;

  for (let i = 0; i < proxies.length; i++) {
    const rawName = nodeNames[i];
    // 信息节点(剩余流量/套餐到期等)直接丢弃
    if (isInfoNode(rawName)) { infoSkipped++; continue; }

    const key = getProxyContentKey(proxies[i]);
    // 完整配置重复 → 跳过
    if (existingKeys.has(key)) { skipped++; continue; }

    let name = rawName;
    let block = proxies[i];
    // 名称冲突 → 加 (2)/(3)... 后缀直到唯一
    if (existingNames.has(name)) {
      let n = 2, candidate;
      do { candidate = `${name} (${n++})`; } while (existingNames.has(candidate));
      block = renameProxy(block, name, candidate);
      name = candidate;
      renamed++;
    }

    parsedNodeNames.push(name);
    parsedProxies.push(block);
    existingNames.add(name);
    existingKeys.add(key);
    added++;
  }
  return { added, skipped, renamed, infoSkipped };
}

// 解析单个来源内容为 {nodeNames, proxies}; 解析不出节点时抛错
function parseAnyContent(content) {
  // 先检测是否是 base64 编码的内容
  let text = content;
  const trimmed = text.trim();
  const isBase64 = !trimmed.includes('\n') && !trimmed.includes('proxies:') && /^[A-Za-z0-9+/=\s]+$/.test(trimmed);
  if (isBase64) {
    try { text = atob(trimmed.replace(/\s/g, '')); } catch(e) {}
  }

  // 检测是否包含 URI 格式的节点链接
  if (text.includes('hysteria2://') || text.includes('vless://')) {
    const r = parseUriLinks(text);
    if (r.nodeNames.length > 0) return r;
  }

  // 回退到 Clash YAML 格式
  return parseSubscription(text);
}

// 把一个来源合并进现有节点池(静默, 不渲染); 返回 {ok, added, error}
function mergeSource(content) {
  try {
    const { nodeNames, proxies } = parseAnyContent(content);
    const { added } = mergeNodes(nodeNames, proxies);
    return { ok: true, added };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

// 通过 CORS 代理轮询抓取 URL, 返回正文文本; 全部失败返回 null
async function fetchUrlBody(url, onProgress) {
  const proxyNames = ['gjken', 'allorigins', 'corsproxy', 'codetabs', 'cors-anywhere'];
  const proxyUrls = [
    `https://cors001.gjken.workers.dev/?url=${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    `https://cors-anywhere.herokuapp.com/${url}`
  ];
  for (let i = 0; i < proxyUrls.length; i++) {
    if (onProgress) onProgress(i, proxyUrls.length, proxyNames[i]);
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(proxyUrls[i], { signal: ctrl.signal });
      clearTimeout(tid);
      if (res.ok) return await res.text();
    } catch(e) {}
  }
  return null;
}

// 统一获取: 重建节点池, 把所有链接行 + 所有粘贴框合并后生成配置
async function fetchAll() {
  const urls = [...document.querySelectorAll('#urlRows .url-input')]
    .map(i => i.value.trim()).filter(Boolean);
  const manuals = [...document.querySelectorAll('#manualRows .manual-input')]
    .map(t => t.value.trim()).filter(Boolean);

  if (!urls.length && !manuals.length) {
    setStatus('请至少输入一个订阅链接或粘贴内容', 'error');
    return;
  }

  // 重建模式: 清空现有节点池, 从所有来源重新合并
  parsedNodeNames = []; parsedProxies = [];
  activeCountryGroups.clear();

  let okSources = 0, failUrls = 0;
  for (let n = 0; n < urls.length; n++) {
    const url = urls[n];
    const body = await fetchUrlBody(url, (pi, pn) =>
      setStatus(`正在获取第 ${n+1}/${urls.length} 个订阅 (代理 ${pi+1}/${pn})...`, 'info'));
    if (body == null) { failUrls++; continue; }
    if (mergeSource(body).ok) okSources++; else failUrls++;
  }
  for (const c of manuals) {
    if (mergeSource(c).ok) okSources++;
  }

  refreshActiveCountryGroups();
  renderNodeList();
  renderGroupConfig();
  updateOutput();

  if (parsedNodeNames.length === 0) {
    document.getElementById('outputCode').innerHTML = '<span style="color:var(--text3);font-style:italic">未解析到任何节点, 请检查订阅链接或内容</span>';
    setStatus(`未解析到节点 — ${failUrls} 个链接获取/解析失败`, 'error');
    return;
  }
  let msg = `完成 — 合并 ${okSources} 个来源, 共 ${parsedNodeNames.length} 个节点`;
  if (failUrls) msg += `, ${failUrls} 个链接失败`;
  setStatus(msg, failUrls ? 'error' : 'success');
}

// 多行输入: 仅当某类输入多于 1 行时显示删除按钮
function refreshRowDelButtons(containerId, delSelector) {
  const rows = document.querySelectorAll(`#${containerId} > div`);
  rows.forEach(row => {
    const del = row.querySelector(delSelector);
    if (del) del.style.display = rows.length > 1 ? '' : 'none';
  });
}

function addUrlRow() {
  const row = document.createElement('div');
  row.className = 'input-row url-row';
  row.style.gap = '6px';
  row.innerHTML = '<input class="inp url-input" type="text" placeholder="https://sub.example.com/api?token=xxx">'
    + '<button class="btn btn-secondary btn-sm row-del" title="删除此行">✕</button>';
  document.getElementById('urlRows').appendChild(row);
  refreshRowDelButtons('urlRows', '.row-del');
}

function addManualRow() {
  const row = document.createElement('div');
  row.className = 'manual-row';
  row.innerHTML = '<textarea class="inp manual-input" placeholder="直接粘贴 Clash 订阅内容..."></textarea>'
    + '<button class="btn btn-secondary btn-sm row-del manual-del" title="删除此块">✕</button>';
  document.getElementById('manualRows').appendChild(row);
  refreshRowDelButtons('manualRows', '.row-del');
}

// 事件绑定
document.getElementById('fetchAllBtn').addEventListener('click', fetchAll);
document.getElementById('addUrlBtn').addEventListener('click', addUrlRow);
document.getElementById('addManualBtn').addEventListener('click', addManualRow);
// 删除行(事件委托)
document.getElementById('urlRows').addEventListener('click', (e) => {
  if (!e.target.classList.contains('row-del')) return;
  e.target.closest('.url-row').remove();
  refreshRowDelButtons('urlRows', '.row-del');
});
document.getElementById('manualRows').addEventListener('click', (e) => {
  if (!e.target.classList.contains('row-del')) return;
  e.target.closest('.manual-row').remove();
  refreshRowDelButtons('manualRows', '.row-del');
});
document.getElementById('copyBtn').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(_lastRenderedConfig || generateConfig()); setStatus('已复制到剪贴板', 'success'); }
  catch(e) { setStatus('复制失败', 'error'); }
});
document.getElementById('dlBtn').addEventListener('click', () => {
  const b = new Blob([_lastRenderedConfig || generateConfig()], { type: 'text/yaml' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(b), download: 'config.yaml' });
  a.click(); URL.revokeObjectURL(a.href);
  setStatus('配置文件已下载', 'success');
});
document.getElementById('clearBtn').addEventListener('click', () => {
  parsedNodeNames = []; parsedProxies = [];
  _lastRenderedConfig = null; // 清空缓存, 确保下次生成时强制重新高亮
  const codeEl = document.getElementById('outputCode');
  codeEl.removeAttribute('data-highlighted');
  codeEl.className = 'language-yaml';
  codeEl.innerHTML = '<span style="color:var(--text3);font-style:italic">等待处理...</span>';
  renderNodeList(); setStatus('已清空', 'info');
});
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  // 直接复用已缓存的 raw 文本, 无需再次 generateConfig
  const raw = _lastRenderedConfig || generateConfig();
  const fsEl = document.getElementById('fsCode');
  const result = hljs.highlight(raw, { language: 'yaml' });
  fsEl.innerHTML = result.value;
  fsEl.dataset.highlighted = 'yes';
  document.getElementById('fsOverlay').classList.add('active');
});

// overlay 开关逻辑统一封装
function bindToggle(openId, closeId, overlayId) {
  document.getElementById(openId).addEventListener('click', () =>
    document.getElementById(overlayId).classList.add('active'));
  document.getElementById(closeId).addEventListener('click', () =>
    document.getElementById(overlayId).classList.remove('active'));
}
// fullscreenBtn open is handled separately above (needs hljs re-highlight)
document.getElementById('fsCloseBtn').addEventListener('click', () =>
  document.getElementById('fsOverlay').classList.remove('active'));
bindToggle('viewNodesBtn', 'nodeCloseBtn', 'nodeOverlay');
document.getElementById('nodeOverlay').addEventListener('click', () =>
  document.getElementById('nodeOverlay').classList.remove('active'));
document.querySelector('.modal-box').addEventListener('click', e => e.stopPropagation());

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('fsOverlay').classList.remove('active');
    document.getElementById('nodeOverlay').classList.remove('active');
  }
});

// ── 分组卡片拖拽排序 (事件委托, 绑定一次) ──
(function setupGroupDrag() {
  const area = document.getElementById('groupConfigArea');
  let dragName = null;
  const clearOver = () => area.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

  area.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.group-item');
    if (!item) return;
    dragName = item.dataset.gname;
    e.dataTransfer.effectAllowed = 'move';
    item.classList.add('dragging');
  });
  area.addEventListener('dragend', (e) => {
    const item = e.target.closest('.group-item');
    if (item) item.classList.remove('dragging');
    dragName = null;
    clearOver();
  });
  area.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.group-item');
    clearOver();
    if (item && item.dataset.gname !== dragName) item.classList.add('drag-over');
  });
  area.addEventListener('drop', (e) => {
    e.preventDefault();
    const item = e.target.closest('.group-item');
    clearOver();
    if (!item || !dragName) return;
    const targetName = item.dataset.gname;
    if (targetName === dragName) return;
    const from = DEFAULT_GROUPS.findIndex(g => g.name === dragName);
    const to = DEFAULT_GROUPS.findIndex(g => g.name === targetName);
    if (from < 0 || to < 0) return;
    const [moved] = DEFAULT_GROUPS.splice(from, 1);
    DEFAULT_GROUPS.splice(to, 0, moved);
    saveGroupOrder();
    renderGroupConfig();
    updateOutput();
  });
})();

renderGroupConfig();

document.getElementById('generateBtn').addEventListener('click', () => {
  if (!parsedProxies.length) {
    setStatus('请先输入订阅链接或粘贴内容', 'error');
    return;
  }
  updateOutput();
  setStatus('配置已生成', 'success');
});
