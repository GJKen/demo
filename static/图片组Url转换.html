<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>URL 转换器</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
  textarea { width: 100%; height: 150px; box-sizing: border-box; }
  pre { background: #f4f4f4; padding: 12px; white-space: pre-wrap; word-break: break-all; }
  button { margin: 8px 4px 8px 0; padding: 6px 16px; cursor: pointer; }
</style>
</head>
<body>

<h3>URL → Gmeek-imgbox 转换器</h3>

<label>日期（可修改）：</label><br>
<input id="date" type="text" placeholder="2026.04.18" style="width:150px; margin-bottom:8px;">
<br>
<label>每行一个 URL：</label><br>
<textarea id="urls" placeholder="https://i.postimg.cc/abc/image.png&#10;https://i.postimg.cc/def/image.png"></textarea>
<br>
<button onclick="convert()">转换</button>
<button onclick="copy()">复制结果</button>
<span id="msg" style="color:green; margin-left:8px;"></span>

<pre id="output"></pre>

<script>
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

document.getElementById('date').value = getToday();

function showMsg(text, color = 'green') {
  const el = document.getElementById('msg');
  el.style.color = color;
  el.textContent = text;
  setTimeout(() => el.textContent = '', 2000);
}

function convert() {
  const date = document.getElementById('date').value.trim() || getToday();
  const urls = document.getElementById('urls').value.trim().split('\n').filter(u => u.trim());
  if (!urls.length) { showMsg('请输入至少一个 URL', 'red'); return; }

  const lines = urls.map(u => '`Gmeek-imgbox="' + u.trim() + '"`').join('\n');
  document.getElementById('output').textContent =
    `<details><summary>${date}</summary>\n\n${lines}\n\n</details>`;
}

function copy() {
  const text = document.getElementById('output').textContent;
  if (!text) { showMsg('请先点击转换', 'red'); return; }
  navigator.clipboard.writeText(text).then(() => showMsg('已复制！'));
}
</script>
</body>
</html>
