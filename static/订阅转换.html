<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅转换工具 - 高级节点分配器</title>
    <style>
        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: #83deff #f1f1f1;}
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; } 
        body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #1e2b3c, #0f212e); padding: 20px 24px; color: white; }
        .card-header h1 { margin: 0 0 5px; font-size: 1.6rem; }
        .card-header p { margin: 0; opacity: 0.8; font-size: 0.85rem; }
        .card-body { padding: 24px; }
        .input-group { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .input-group input { flex: 1; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 28px; font-family: monospace; font-size: 0.9rem; outline: none; }
        .input-group input:focus { border-color: #3b82f6; }
        .input-group button { background: #1e2b3c; color: white; border: none; padding: 12px 24px; border-radius: 28px; cursor: pointer; font-weight: 600; }
        .input-group button:hover { background: #0a2a3b; }
        .manual-area { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        .manual-area textarea { width: 100%; padding: 12px; border-radius: 16px; border: 1.5px solid #e2e8f0; font-family: monospace; font-size: 0.8rem; resize: vertical; }
        .btn-secondary { background: #6b7280; margin-top: 8px; }
        .status { padding: 12px 16px; border-radius: 12px; margin: 16px 0; font-size: 0.85rem; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.info { background: #dbeafe; color: #1e40af; }
        .two-columns { display: flex; gap: 24px; flex-wrap: wrap; align-items: stretch; }
        .column { flex: 1; min-width: 300px; }
        .column #groupConfigArea{ flex: 1; max-height: 550px; overflow-y: auto; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .proxy-list { background: #f8fafc; border-radius: 16px; padding: 16px; height: 630px; overflow-y: auto; }
        .proxy-item { padding: 6px 10px; margin: 4px 0; background: white; border-radius: 8px; font-family: monospace; font-size: 0.8rem; border: 1px solid #e2e8f0; word-break: break-all; }
        .dropdown-group { margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .dropdown-header { background: #f1f5f9; padding: 2px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; user-select: none; }
        .dropdown-header:hover { background: #e2e8f0; }
        .dropdown-arrow { transition: transform 0.2s; font-size: 1.2rem; }
        .dropdown-arrow.open { transform: rotate(90deg); }
        .dropdown-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: white; }
        .dropdown-content.open { max-height: 300px; overflow-y: auto; }
        .checkbox-item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f1f5f9; }
        .checkbox-item:hover { background: #f8fafc; }
        .checkbox-item input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-item label { cursor: pointer; flex: 1; }
        .checkbox-item small { color: #6b7280; font-size: 0.7rem; }
        
        .group-checkbox { margin: 8px 0; padding: 10px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .group-checkbox input { width: 20px; height: 20px; cursor: pointer; }
        .group-checkbox label { font-weight: 500; cursor: pointer; flex: 1; }
        
        .output-area { background: #0f172a; color: #e2e8f0; font-family: monospace; font-size: 0.75rem; padding: 16px; border-radius: 16px; white-space: pre-wrap; word-break: break-all; max-height: 500px; overflow: auto; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .output-header button { background: #3b82f6; border: none; padding: 6px 16px; border-radius: 20px; color: white; cursor: pointer; }
        hr { margin: 20px 0; }
        .badge { background: #e2e8f0; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; margin-left: 8px; }
        .info-note { font-size: 1rem; color: #6b7280; margin-top: 8px; padding: 8px; background: #f8fafc; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🔄 订阅转换工具 · 高级节点分配器</h1>
            <p>自动分类节点到国家组 | 手动选择/自动选择可勾选其他代理组</p>
        </div>
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="https://example.com/subscription?token=xxx">
                <button id="fetchBtn">🌐 从URL获取</button>
            </div>
            
            <div class="manual-area">
                <textarea id="manualInput" rows="4" placeholder="或直接粘贴订阅内容(YAML/Clash配置)..."></textarea>
                <button id="useManualBtn" class="btn-secondary" style="margin-top: 8px;">📝 使用手动内容</button>
            </div>

            <div id="status" class="status info">💡 输入订阅链接或粘贴内容, 点击获取</div>

            <div class="two-columns">
                <!-- 左侧：节点列表 -->
                <div class="column">
                    <div class="section-title">📡 解析出的节点 <span id="nodeCount" class="badge">0</span></div>
                    <div id="nodeList" class="proxy-list"><div style="color: #9ca3af; text-align: center;">等待加载订阅...</div></div>
                </div>

                <!-- 右侧：代理组配置 -->
                <div class="column">
                    <div class="section-title">🎯 代理组配置</div>
                    <div id="groupConfigArea"></div>
                    <div class="info-note">
                        💡 提示：点击「🚀手动选择」和「♻️自动选择」可展开下拉列表, 勾选需要加入的其他代理组。<br>
                        📌 国家类别代理组(香港Auto、台湾Auto等)自动匹配节点, 不可手动添加其他组。
                    </div>
                </div>
            </div>

            <hr>

            <div class="output-header">
                <span class="section-title" style="margin-bottom: 0;">📄 转换后的配置</span>
                <div>
                    <button id="copyOutputBtn">📋 复制配置</button>
                    <button id="downloadOutputBtn">💾 下载配置文件</button>
                    <button id="clearOutputBtn" style="background: #ef4444;">🗑️ 清空内容</button>
                </div>
            </div>
            <div id="outputArea" class="output-area">等待处理...</div>
        </div>
    </div>
</div>

<script>
document.getElementById('clearOutputBtn').addEventListener('click', () => {
    document.getElementById('outputArea').textContent = '等待处理...';
    setStatus('✅ 已清空输出内容', 'success');
});
const FIXED_HEADER = `mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'
unified-delay: true
tcp-concurrent: true
ipv6: false
dns:
    enable: true
    ipv6: false
    follow-rule: false
    respect-rules: true
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    default-nameserver: [223.5.5.5, 119.29.29.29]
    proxy-server-nameserver: ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    nameserver: [223.5.5.5, 119.29.29.29]
    fallback: ['https://cloudflare-dns.com/dns-query', 'https:///dns.cloudflare.com/dns-query', 'https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    fallback-filter: { geoip: true, geoip-code: CN, geosite: [gfw] }
`;

    const DEFAULT_GROUPS = [
        { name: "🚀手动选择", type: "select", proxies: [], canSelectGroups: true },
        { name: "♻️自动选择", type: "url-test", url: "'http://cp.cloudflare.com/generate_204'", proxies: [], canSelectGroups: true },
        { name: "AIGC", type: "select", proxies: ["DIRECT"], canSelectGroups: true },
        { name: "PikPak", type: "select", proxies: ["DIRECT"], canSelectGroups: true },
        { name: "Telegram", type: "select", proxies: ["DIRECT"], canSelectGroups: true },
        { name: "应用程序代理", type: "select", proxies: ["DIRECT"], canSelectGroups: true },
        { name: "Google", type: "select", proxies: ["DIRECT"], canSelectGroups: true },
        { name: "🛑ADblock", type: "select", proxies: ["REJECT", "DIRECT"], canSelectGroups: true },
        { name: "🐟漏网之鱼", type: "select", proxies: ["DIRECT"], canSelectGroups: true },
        { name: "🇭🇰香港 Auto", type: "url-test", url: "'http://cp.cloudflare.com/generate_204'", proxies: [], canSelectGroups: false, isCountry: true },
        { name: "🇹🇼台湾 Auto", type: "url-test", url: "'http://cp.cloudflare.com/generate_204'", proxies: [], canSelectGroups: false, isCountry: true },
        { name: "🇸🇬新加坡 Auto", type: "url-test", url: "'http://cp.cloudflare.com/generate_204'", proxies: [], canSelectGroups: false, isCountry: true },
        { name: "🇯🇵日本 Auto", type: "url-test", url: "'http://cp.cloudflare.com/generate_204'", proxies: [], canSelectGroups: false, isCountry: true },
        { name: "🇺🇸美国 Auto", type: "url-test", url: "'http://cp.cloudflare.com/generate_204'", proxies: [], canSelectGroups: false, isCountry: true }
    ];

    // 存储选中的其他代理组(用于手动选择和自动选择)
    let selectedProxyGroups = {
        "🚀手动选择": [],
        "♻️自动选择": []
    };

    let parsedNodeNames = [];
    let parsedProxies = [];
    let dropdownStates = {}; // 存储折叠状态

    // 国家/地区匹配规则
    const countryRules = [
        { name: "🇭🇰香港 Auto", keywords: ['香港', '🇭🇰', 'HK', 'HongKong'] },
        { name: "🇹🇼台湾 Auto", keywords: ['台湾', '🇹🇼', 'TW', 'Taiwan'] },
        { name: "🇸🇬新加坡 Auto", keywords: ['新加坡', '🇸🇬', 'SG', 'Singapore'] },
        { name: "🇯🇵日本 Auto", keywords: ['日本', '🇯🇵', 'JP', 'Japan', 'Tokyo', '东京'] },
        { name: "🇺🇸美国 Auto", keywords: ['美国', '🇺🇸', 'US', 'USA', 'America', '圣何塞', '洛杉矶', '凤凰城', 'San Jose', 'Los Angeles'] }
    ];

    // 获取可选择的代理组列表(排除自身和不允许选择的)
    function getSelectableGroups(currentGroupName) {
        // 只返回 url-test 类型的代理组, 且排除自身
        return DEFAULT_GROUPS.filter(g => 
            g.name !== currentGroupName && 
            g.type === "url-test"
        ).map(g => g.name);
    }

    // 解析订阅内容
    function parseSubscription(content) {
        try {
            const proxiesStartMatch = content.match(/proxies:\s*\n/);
            if (!proxiesStartMatch) {
                throw new Error("未找到 proxies 字段");
            }
            
            const startIndex = proxiesStartMatch.index + proxiesStartMatch[0].length;
            const groupsMatch = content.match(/proxy-groups:\s*\n/);
            let endIndex = groupsMatch ? groupsMatch.index : content.length;
            
            let proxiesSection = content.substring(startIndex, endIndex);
            const proxies = [];
            const nodeNames = [];
            
            const lines = proxiesSection.split('\n');
            let currentProxy = '';
            let braceCount = 0;
            let inProxy = false;
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (line.match(/^\s*-\s*\{/)) {
                    if (inProxy && currentProxy) {
                        proxies.push(currentProxy);
                        const nameMatch = currentProxy.match(/name:\s*['"]?([^,'"}]+)['"]?/);
                        if (nameMatch) {
                            nodeNames.push(nameMatch[1].trim().replace(/^['"]|['"]$/g, ''));
                        }
                    }
                    currentProxy = line.trim();
                    braceCount = (line.match(/\{/g) || []).length - (line.match(/\}/g) || []).length;
                    inProxy = true;
                } else if (inProxy) {
                    currentProxy += ' ' + line.trim();
                    braceCount += (line.match(/\{/g) || []).length - (line.match(/\}/g) || []).length;
                    if (braceCount === 0) {
                        proxies.push(currentProxy);
                        const nameMatch = currentProxy.match(/name:\s*['"]?([^,'"}]+)['"]?/);
                        if (nameMatch) {
                            nodeNames.push(nameMatch[1].trim().replace(/^['"]|['"]$/g, ''));
                        }
                        currentProxy = '';
                        inProxy = false;
                    }
                }
            }
            
            if (inProxy && currentProxy) {
                proxies.push(currentProxy);
                const nameMatch = currentProxy.match(/name:\s*['"]?([^,'"}]+)['"]?/);
                if (nameMatch) {
                    nodeNames.push(nameMatch[1].trim().replace(/^['"]|['"]$/g, ''));
                }
            }
            
            if (nodeNames.length === 0) {
                throw new Error("未找到任何节点");
            }
            
            const cleanedProxies = proxies.map(p => {
                let cleaned = p.trim();
                if (!cleaned.startsWith('-')) {
                    cleaned = '- ' + cleaned;
                }
                return '    ' + cleaned;
            });
            
            return { nodeNames, proxies: cleanedProxies };
        } catch (e) {
            throw new Error(`解析失败: ${e.message}`);
        }
    }

    // 按国家分类节点
    function classifyNodesByCountry(nodes) {
        const specialKeywords = ['剩余流量', '距离下次重置', '套餐到期', '流量：', '重置剩余', '到期'];
        const normalNodes = nodes.filter(name => !specialKeywords.some(keyword => name.includes(keyword)));
        const specialNodes = nodes.filter(name => specialKeywords.some(keyword => name.includes(keyword)));
        
        const countryNodes = {};
        countryRules.forEach(rule => { countryNodes[rule.name] = []; });
        
        normalNodes.forEach(node => {
            for (const rule of countryRules) {
                if (rule.keywords.some(keyword => node.includes(keyword))) {
                    countryNodes[rule.name].push(node);
                    break;
                }
            }
        });
        
        return { normalNodes, specialNodes, countryNodes };
    }

    // 生成配置
    function generateConfig() {
    if (parsedProxies.length === 0) {
        return FIXED_HEADER + "\nproxies: []\n\nproxy-groups:\n" + 
            DEFAULT_GROUPS.map(g => `    - { name: ${g.name}, type: ${g.type}${g.url ? `, url: ${g.url}` : ''}, proxies: ['DIRECT'] }`).join('\n');
    }
    
    const proxiesSection = "proxies:\n" + parsedProxies.join('\n');
    const { normalNodes, specialNodes, countryNodes } = classifyNodesByCountry(parsedNodeNames);
    
    const groupNames = DEFAULT_GROUPS.map(g => g.name);
    // 获取所有 url-test 类型的组名
    const urlTestGroups = DEFAULT_GROUPS.filter(g => g.type === "url-test").map(g => g.name);
    
    const groupsSection = "proxy-groups:\n" + DEFAULT_GROUPS.map(group => {
        let proxiesList = [];
        
        if (group.name === "♻️自动选择") {
            // 自动选择：节点 + 用户勾选的代理组
            proxiesList = [...normalNodes, ...specialNodes];
            const selectedGroups = selectedProxyGroups["♻️自动选择"] || [];
            selectedGroups.forEach(g => {
                if (groupNames.includes(g) && g !== group.name) {
                    proxiesList.push(g);
                }
            });
            if (proxiesList.length === 0) proxiesList = ['DIRECT'];
        } 
        else if (group.name === "🚀手动选择") {
            // 手动选择：节点 + DIRECT + 用户勾选的代理组
            proxiesList = [...normalNodes, 'DIRECT'];
            const selectedGroups = selectedProxyGroups["🚀手动选择"] || [];
            selectedGroups.forEach(g => {
                if (groupNames.includes(g) && g !== group.name) {
                    proxiesList.push(g);
                }
            });
            if (proxiesList.length === 0) proxiesList = ['DIRECT'];
        }
        else if (group.isCountry) {
            // 国家类别代理组：只能包含匹配的节点
            proxiesList = countryNodes[group.name] || [];
            if (proxiesList.length === 0) proxiesList = ['DIRECT'];
        }
        else if (["AIGC", "PikPak", "Telegram", "应用程序代理", "Google"].includes(group.name)) {
            // 这些组：节点 + 用户勾选的代理组 + DIRECT
            proxiesList = [...normalNodes, 'DIRECT'];
            // 读取用户勾选的代理组
            const selectedGroups = selectedProxyGroups[group.name] || [];
            selectedGroups.forEach(g => {
                if (groupNames.includes(g) && g !== group.name) {
                    proxiesList.push(g);
                }
            });
            if (proxiesList.length === 0) proxiesList = ['DIRECT'];
        }
        else if (group.name === "🐟漏网之鱼") {
            proxiesList = normalNodes.length > 0 ? [...normalNodes, 'DIRECT'] : ['DIRECT'];
            // 也支持用户勾选的代理组
            const selectedGroups = selectedProxyGroups[group.name] || [];
            selectedGroups.forEach(g => {
                if (groupNames.includes(g) && g !== group.name) {
                    proxiesList.push(g);
                }
            });
        }
        else if (group.name === "🛑ADblock") {
            proxiesList = ["REJECT", "DIRECT"];
        }
        
        // 去重
        proxiesList = [...new Set(proxiesList)];
        
        // 只对国家级别的 url-test 组过滤掉其他代理组
        if (group.isCountry && urlTestGroups.includes(group.name)) {
            proxiesList = proxiesList.filter(item => !groupNames.includes(item));
        }
        
        if (proxiesList.length === 0) proxiesList = ['DIRECT'];
        
        let proxiesStr = "[" + proxiesList.map(p => {
            // 需要转义的特殊字符
            if (p.includes(' ') || p.includes('|') || p.includes('-') || p.includes('：') || p.includes('—') || p.includes('？') || p.includes('🚀') || p.includes('♻️') || p.includes('—') || p.includes('倍') || p.includes('流媒体')) {
                return `'${p}'`;
            }
            return p;
        }).join(', ') + "]";
        
        if (group.type === "url-test") {
            return `    - { name: ${group.name}, type: ${group.type}, url: ${group.url}, proxies: ${proxiesStr} }`;
        } else {
            return `    - { name: ${group.name}, type: ${group.type}, proxies: ${proxiesStr} }`;
        }
    }).join('\n');
    
    return `${FIXED_HEADER}\n${proxiesSection}\n\n${groupsSection}`;
}

    // 渲染代理组配置UI(带折叠下拉)
    function renderGroupConfigUI() {
    const container = document.getElementById('groupConfigArea');
    const groupNames = DEFAULT_GROUPS.map(g => g.name);
    
    container.innerHTML = DEFAULT_GROUPS.map(group => {
        // url-test 类型的组(自动选择、各国Auto)不能选择其他代理组
        const isUrlTest = group.type === "url-test";
        
        if (group.canSelectGroups && group.type === "select") {
            // 只有 select 类型且 canSelectGroups 为 true 的组才能展开选择
            const isOpen = dropdownStates[group.name] || false;
            const selectedList = selectedProxyGroups[group.name] || [];
            const selectableGroups = getSelectableGroups(group.name);
            const currentSelected = selectedProxyGroups[group.name] || [];
            const allSelected = selectableGroups.length > 0 && selectableGroups.every(g => currentSelected.includes(g));
            
            return `
                <div class="dropdown-group">
                    <div class="dropdown-header" onclick="toggleDropdown('${group.name}')">
                        <span>📁 ${group.name} <small style="color:#6b7280;">(${group.type})</small></span>
                        <span class="dropdown-arrow ${isOpen ? 'open' : ''}">▶</span>
                    </div>
                    <div class="dropdown-content ${isOpen ? 'open' : ''}">
                        <div class="checkbox-item" style="background:#f0fdf4;">
                            <input type="checkbox" id="select_all_${group.name}" ${allSelected ? 'checked' : ''} onchange="toggleAllGroups('${group.name}')">
                            <label><strong>全选所有代理组</strong></label>
                        </div>
                        ${selectableGroups.map(g => `
                            <div class="checkbox-item">
                                <input type="checkbox" id="group_sel_${group.name}_${g.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '_')}" 
                                    value="${g}" 
                                    ${selectedList.includes(g) ? 'checked' : ''}
                                    onchange="updateSelectedGroup('${group.name}', '${g}', this.checked)">
                                <label>${g}</label>
                                <small>代理组</small>
                            </div>
                        `).join('')}
                        ${selectableGroups.length === 0 ? '<div style="padding: 12px; color: #9ca3af; text-align: center;">暂无可选的代理组</div>' : ''}
                    </div>
                </div>
            `;
        } else {
            // 普通代理组或 url-test 组
            let infoText = '';
            if (group.isCountry) {
                infoText = '<small style="color:#6b7280;">(自动匹配节点)</small>';
            } else if (isUrlTest) {
                infoText = '<small style="color:#ef4444;">(url-test类型, 只能包含节点, 不能包含其他代理组)</small>';
            }
            return `
                <div class="group-checkbox">
                    <span style="font-weight: 500;">${group.name}</span>
                    ${infoText}
                    <small style="margin-left: auto; color:#6b7280;">${group.type}</small>
                </div>
            `;
        }
    }).join('');
}

    // 切换折叠状态
    window.toggleDropdown = function(groupName) {
        dropdownStates[groupName] = !dropdownStates[groupName];
        renderGroupConfigUI();
        updateOutput();
    };

    // 更新选中的代理组
    window.updateSelectedGroup = function(groupName, selectedGroup, isChecked) {
        if (!selectedProxyGroups[groupName]) {
            selectedProxyGroups[groupName] = [];
        }
        if (isChecked) {
            if (!selectedProxyGroups[groupName].includes(selectedGroup)) {
                selectedProxyGroups[groupName].push(selectedGroup);
            }
        } else {
            selectedProxyGroups[groupName] = selectedProxyGroups[groupName].filter(g => g !== selectedGroup);
        }
        updateOutput();
    };

    // 全选/取消全选
    window.toggleAllGroups = function(groupName) {
        const selectableGroups = getSelectableGroups(groupName);
        const currentSelected = selectedProxyGroups[groupName] || [];
        const allSelected = selectableGroups.length > 0 && selectableGroups.every(g => currentSelected.includes(g));
        
        if (allSelected) {
            selectedProxyGroups[groupName] = [];
        } else {
            selectedProxyGroups[groupName] = [...selectableGroups];
        }
        renderGroupConfigUI();
        updateOutput();
    };

    function updateUI() {
        const nodeListDiv = document.getElementById('nodeList');
        if (parsedNodeNames.length === 0) {
            nodeListDiv.innerHTML = '<div style="color: #9ca3af; text-align: center;">暂无节点</div>';
        } else {
            nodeListDiv.innerHTML = parsedNodeNames.map(name => `<div class="proxy-item">🔗 ${escapeHtml(name)}</div>`).join('');
        }
        document.getElementById('nodeCount').textContent = parsedNodeNames.length;
        
        renderGroupConfigUI();
        updateOutput();
    }
    
    function updateOutput() {
        document.getElementById('outputArea').textContent = generateConfig();
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function setStatus(message, type = 'info') {
        const statusDiv = document.getElementById('status');
        statusDiv.className = `status ${type}`;
        statusDiv.textContent = message;
    }
    
    function processContent(content) {
        try {
            const { nodeNames, proxies } = parseSubscription(content);
            parsedNodeNames = nodeNames;
            parsedProxies = proxies;
            setStatus(`✅ 解析成功！找到 ${nodeNames.length} 个节点`, 'success');
            updateUI();
        } catch (e) {
            setStatus(`❌ ${e.message}`, 'error');
            parsedNodeNames = [];
            parsedProxies = [];
            updateUI();
        }
    }
    
    async function fetchFromUrl(url) {
        setStatus('🔄 正在获取订阅内容...', 'info');
        const proxyList = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            `https://corsproxy.io/?url=${encodeURIComponent(url)}`
        ];
        
        for (const proxyUrl of proxyList) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                const response = await fetch(proxyUrl, {
                    headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (response.ok) {
                    const text = await response.text();
                    processContent(text);
                    return;
                }
            } catch (e) {
                console.warn('代理失败:', e);
            }
        }
        setStatus('❌ 获取失败, 请尝试手动粘贴内容', 'error');
    }
    
    // 事件绑定
    document.getElementById('fetchBtn').addEventListener('click', () => {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) { setStatus('请输入订阅链接', 'error'); return; }
        fetchFromUrl(url);
    });
    
    document.getElementById('useManualBtn').addEventListener('click', () => {
        const content = document.getElementById('manualInput').value.trim();
        if (!content) { setStatus('请在文本框中粘贴订阅内容', 'error'); return; }
        processContent(content);
    });
    
    document.getElementById('copyOutputBtn').addEventListener('click', async () => {
        const output = document.getElementById('outputArea').textContent;
        try {
            await navigator.clipboard.writeText(output);
            setStatus('✅ 已复制到剪贴板', 'success');
        } catch (e) { setStatus('❌ 复制失败', 'error'); }
    });
    
    document.getElementById('downloadOutputBtn').addEventListener('click', () => {
        const output = document.getElementById('outputArea').textContent;
        const blob = new Blob([output], { type: 'text/yaml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'config.yaml';
        a.click();
        URL.revokeObjectURL(url);
        setStatus('✅ 配置文件已下载', 'success');
    });
    
    // 初始化
    renderGroupConfigUI();
    updateUI();
</script>
</body>
</html>
