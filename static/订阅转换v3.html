<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClash订阅附加规则器</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#a9a9a9;--text4:#47fcd4;
  --accent:#58a6ff;--accent2:#1f6feb;--accent-bg:rgba(88,166,255,0.1);
  --green:#3fb950;--green-bg:rgba(63,185,80,0.1);
  --orange:#d29922;--orange-bg:rgba(210,153,34,0.12);
  --red:#f85149;--red-bg:rgba(248,81,73,0.1);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,0.1);
  --radius:8px;--radius-lg:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px;min-height:100vh}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;max-width:100%;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:20px;height:56px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-0.3px}
.logo-ver{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.main{display:grid;grid-template-columns:minmax(250px,25%) minmax(300px,1fr) minmax(280px,30%);overflow:hidden;height:100%}
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
.panel-header{padding:0 18px;height:42px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.badge{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:1px 7px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.badge.green{background:var(--green-bg);border-color:rgba(63,185,80,0.3);color:var(--green)}
.panel-body{flex:1;overflow-y:auto;padding:14px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* Input Panel */
.input-section{margin-bottom:16px}
.input-label{font-size:14px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.input-row{display:flex;gap:8px}
.inp{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;border-radius:var(--radius);outline:none;transition:border-color 0.15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
textarea.inp{display:block;width:100%;height:80px;font-size:11.5px;resize:vertical;margin:0}
.btn{padding:8px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:#388bfd}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border2)}
.btn-sm{padding:5px 10px}

.status-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;transition:border-color 0.3s,background 0.3s,box-shadow 0.3s}
@keyframes statusPulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:0.4}100%{transform:scale(1);opacity:1}}
@keyframes statusFlash{0%{box-shadow:0 0 0 0 transparent}30%{box-shadow:0 0 12px 2px var(--flash-color)}100%{box-shadow:0 0 0 0 transparent}}
.status-bar.flash .status-dot{animation:statusPulse 0.6s ease}
.status-bar.flash{animation:statusFlash 0.6s ease}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-bar.info .status-dot{background:var(--accent)}
.status-bar.success .status-dot{background:var(--green)}
.status-bar.error .status-dot{background:var(--red)}
.status-bar.success{border-color:rgba(63,185,80,0.3);background:var(--green-bg)}
.status-bar.error{border-color:rgba(248,81,73,0.3);background:var(--red-bg)}

/* Node List */
.node-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--radius);margin-bottom:3px;background:var(--bg2);border:1px solid var(--border);transition:border-color 0.1s}
.node-item:hover{border-color:#6cacff}
.node-flag{font-size:13px;flex-shrink:0;width:20px;text-align:center}
.node-name{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-tag{font-size:10px;padding:1px 5px;border-radius:4px;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.tag-hk{background:rgba(255,179,128,0.15);color:#ffb380;border:1px solid rgba(255,179,128,0.3)}
.tag-tw{background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3)}
.tag-sg{background:rgba(63,185,80,0.15);color:#3fb950;border:1px solid rgba(63,185,80,0.3)}
.tag-jp{background:rgba(188,140,255,0.15);color:#bc8cff;border:1px solid rgba(188,140,255,0.3)}
.tag-us{background:rgba(210,153,34,0.15);color:#d29922;border:1px solid rgba(210,153,34,0.3)}
.tag-eu{background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3)}
.tag-kr{background:rgba(63,185,80,0.15);color:#3fb950;border:1px solid rgba(63,185,80,0.3)}
.tag-other{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* Group Config Panel */
.group-item{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2)}
.group-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;transition:background 0.1s}
.group-header:hover{background:var(--bg3)}
.group-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.group-name{flex:1;font-weight:500}
.group-type-badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:4px;flex-shrink:0}
.type-select{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(88,166,255,0.3)}
.type-urltest{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.3)}
.type-country{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(188,140,255,0.3)}
.chevron{width:16px;height:16px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.group-content{border-top:1px solid var(--border)}
.group-content-inner{padding:10px 14px}
.proxy-option{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background 0.1s}
.proxy-option:hover{background:var(--bg3)}
.proxy-option input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.proxy-option label{font-size:12px;cursor:pointer;color:var(--text2);flex:1}
.proxy-option label:hover{color:var(--text)}
.select-all-row{padding:6px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.select-all-row label{font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.group-info{padding:8px 14px 10px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.info-icon{opacity:0.6}

/* Output Panel */
.output-toolbar{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.output-code{flex:1;overflow:auto;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.6;color:#e6edf3;white-space:pre;tab-size:2}
.output-code::-webkit-scrollbar{width:4px;height:4px}
.output-code::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.divider{height:1px;background:var(--border);margin:12px 0}

.btn-copy{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-copy:hover{background:var(--bg4)}
.btn-dl{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,0.3)}
.btn-dl:hover{background:rgba(63,185,80,0.2)}
.btn-clear{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,0.3)}
.btn-clear:hover{background:rgba(248,81,73,0.2)}

/* Overlays — shared header/title/code styles */
.fs-header{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fs-title{font-size:13px;color:var(--text2);font-weight:500}
.fs-code{flex:1;overflow:auto;font-family:'IBM Plex Mono',monospace;line-height:1.6;white-space:pre}
.fs-code::-webkit-scrollbar{width:4px;height:4px}
.fs-code::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* Fullscreen Overlay */
.fs-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column}
.fs-overlay.active{display:flex}
.fs-overlay .fs-code{padding:20px;font-size:12px;color:#e6edf3;tab-size:2}

/* Center Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.modal-box .fs-code{padding:10px;font-size:12px}

.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;text-align:center}
.stat-num{font-size:18px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

.highlight-key{color:#79c0ff}
.highlight-string{color:#a8d8a8}
.highlight-number{color:#f0883e}
.highlight-comment{color:#6e7681}
.highlight-bracket{color:#e6edf3}
.highlight-dash{color:#ffa657}

/* Mobile Responsive */
@media(max-width:900px){
  .main{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;height:auto}
  .panel:nth-child(3){border-top:1px solid var(--border);grid-column:1 / -1;width:100%}
}
@media(max-width:600px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto;overflow:visible}
  .panel{border-right:none;border-bottom:1px solid var(--border);width:100%;flex:none}
  .panel-body{overflow:visible;height:auto}
  .app{height:auto;overflow:visible}
  .output-code{height:250px;overflow:auto}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-text">OpenClash订阅附加规则器</div>
    </div>
    <span class="logo-ver">v2.0</span>
  </div>
  <div class="main">
    <!-- Panel 1: Input + Node List -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📡 订阅源</div>
        <span id="nodeCount" class="badge">0 节点</span>
      </div>
      <div class="panel-body">
        <div class="input-section">
          <div class="input-label">订阅链接</div>
          <div class="input-row" style="gap:6px">
            <input class="inp" type="text" id="urlInput" placeholder="https://sub.example.com/api?token=xxx">
            <button class="btn btn-primary btn-sm" id="fetchBtn">获取</button>
          </div>
        </div>
        <div class="input-section">
          <div class="input-label">手动粘贴 YAML 内容</div>
          <textarea class="inp" id="manualInput" placeholder="直接粘贴 Clash 订阅内容..."></textarea>
          <button class="btn btn-secondary btn-sm" style="margin-top:6px;width:100%" id="useManualBtn">使用此内容</button>
        </div>
        <div id="status" class="status-bar info">
          <div class="status-dot"></div>
          <span>等待输入订阅链接或粘贴内容</span>
        </div>
        <div id="statsRow" class="stats-row" style="display:none">
          <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总节点</div></div>
          <div class="stat-card"><div class="stat-num" id="statCountries">0</div><div class="stat-label">国家</div></div>
          <div class="stat-card"><div class="stat-num" id="statGroups">0</div><div class="stat-label">代理组</div></div>
        </div>
        <div class="divider" style="margin:8px 0"></div>
        <button class="btn btn-secondary btn-sm" style="width:100%;display:none" id="viewNodesBtn">📋 查看节点列表</button>
      </div>
    </div>

    <!-- Panel 2: Group Config -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🎯 代理组配置</div>
        <span id="groupCount" class="badge">0 组</span>
      </div>
      <div class="panel-body" id="groupConfigArea"></div>
    </div>

    <!-- Panel 3: Output -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📄 生成配置</div>
      </div>
      <div class="output-toolbar">
        <button class="btn btn-primary btn-sm" id="generateBtn">⚡ 生成配置</button>
        <button class="btn btn-copy btn-sm" id="copyBtn">📋 复制</button>
        <button class="btn btn-dl btn-sm" id="dlBtn">💾 下载</button>
        <button class="btn btn-clear btn-sm" id="clearBtn">🗑 清空</button>
        <button class="btn btn-secondary btn-sm" id="fullscreenBtn" style="margin-left:auto">⛶ 全屏</button>
      </div>
      <div id="outputCode" class="output-code"><span style="color:var(--text3);font-style:italic">等待处理...</span></div>
    </div>
  </div>
</div>

<!-- Fullscreen Overlay -->
<div class="fs-overlay" id="fsOverlay">
  <div class="fs-header">
    <span class="fs-title">📄 生成配置 — 全屏查看</span>
    <button class="btn btn-secondary btn-sm" id="fsCloseBtn">✕ 关闭</button>
  </div>
  <div class="fs-code" id="fsCode"></div>
</div>

<!-- Node List Modal -->
<div class="modal-overlay" id="nodeOverlay">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="fs-header">
      <span class="fs-title">📋 节点列表</span>
      <button class="btn btn-secondary btn-sm" id="nodeCloseBtn">✕ 关闭</button>
    </div>
    <div class="fs-code" id="nodeListOverlay"></div>
  </div>
</div>

<script>
const FIXED_HEADER = `mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
ipv6: false
bind-address: '*'
log-level: info
external-controller: '127.0.0.1:9090'
unified-delay: true
tcp-concurrent: true
# 认证配置
skip-auth-prefixes:
  - 192.168.1.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8
dns:
    enable: true
    ipv6: false
    follow-rule: false
    respect-rules: true
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    default-nameserver:
      - 119.29.29.29
      - 180.184.1.1
      - 223.5.5.5
    proxy-server-nameserver: ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    nameserver: [119.29.29.29,223.5.5.5]
    fallback: ['https://cloudflare-dns.com/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    fallback-filter: { geoip: true, geoip-code: CN, geosite: [gfw] }
    fake-ip-filter:
      - geosite:cn
      - geosite:Private
      - +.miwifi.com
      - +.docker.io
      - +.market.xiaomi.com
      - +.push.apple.com
`;

const RULES = `rules:
  - RULE-SET,private,DIRECT
  - RULE-SET,adobe,Adobe
  - RULE-SET,pic_hub,PicHub
  - RULE-SET,steam,🚀手动选择
  - RULE-SET,google,Google
  - RULE-SET,claude,AIGC
  - RULE-SET,ai_GC,AIGC
  - RULE-SET,pikpakdomain,PikPak
  - RULE-SET,telegram,Telegram
  - RULE-SET,geolocation-!cn,🚀手动选择
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT

function syntaxHighlight(text) {
  // 将 proxies 段原样输出，其余部分做语法高亮
  const proxiesStart = text.indexOf('\nproxies:\n');
  const proxiesEnd = text.indexOf('\nproxy-groups:\n');

  if (proxiesStart === -1 || proxiesEnd === -1 || proxiesEnd <= proxiesStart) {
    return highlightSection(text);
  }

  const before = text.substring(0, proxiesStart + 1);
  const proxies = text.substring(proxiesStart + 1, proxiesEnd);
  const after = text.substring(proxiesEnd + 1);

  // proxies 段：第一行 "proxies:" 需要高亮，节点行只高亮 "- " 前缀
  const firstNl = proxies.indexOf('\n');
  const proxiesHeader = firstNl === -1 ? proxies : proxies.substring(0, firstNl);
  const proxiesBody = firstNl === -1 ? '' : proxies.substring(firstNl);
  const proxiesBodyEsc = proxiesBody.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(\s*)(- )/gm, '$1<span class="highlight-dash">- </span>');
  return highlightSection(before) + highlightSection(proxiesHeader) + proxiesBodyEsc + highlightSection(after);
}

function highlightSection(text) {
  return text.split('\n').map(line => {
    const esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (esc.trim().startsWith('#')) return `<span class="highlight-comment">${esc}</span>`;
    if (esc.match(/^[a-zA-Z_\u4e00-\u9fa5🇭🇰🇹🇼🇸🇬🇯🇵🇺🇸🚀♻️🛑🐟][^:]*:/)) {
      const colon = esc.indexOf(':');
      const key = esc.substring(0, colon);
      const val = esc.substring(colon + 1);
      // proxies: [ 和 url: 后面的内容不高亮
      const noHighlight = key.trim() === 'proxies' || key.trim() === 'url';
      const styledVal = noHighlight ? val : val.replace(/('.*?')/g, '<span class="highlight-string">$1</span>')
                          .replace(/\b(\d+)\b/g, '<span class="highlight-number">$1</span>');
      return `<span class="highlight-key">${key}</span><span style="color:var(--text3)">:</span>${styledVal}`;
    }
    if (esc.trim().startsWith('-')) {
      const rest = esc.substring(esc.indexOf('-') + 1);
      // proxies: [ 和 url: 后面的内容不高亮，先剥离这两个 key 的值
      const styledRest = rest.replace(/(proxies:\s*\[[\s\S]*?\])/g, '$1')
                             .replace(/(url:\s*'[^']*')/g, '$1')
                             .replace(/('.*?')/g, (m, p1, offset) => {
                               // 检查是否在 proxies:[] 或 url:'' 内部，是则不高亮
                               const before = rest.substring(0, offset);
                               const proxiesIdx = before.lastIndexOf('proxies:');
                               const urlIdx = before.lastIndexOf('url:');
                               const bracketOpen = before.lastIndexOf('[');
                               const bracketClose = before.lastIndexOf(']');
                               if (proxiesIdx !== -1 && bracketOpen > proxiesIdx && (bracketClose === -1 || bracketOpen > bracketClose)) return m;
                               if (urlIdx !== -1 && offset > urlIdx) return m;
                               return `<span class="highlight-string">${p1}</span>`;
                             })
                             .replace(/\b(\d+)\b/g, (m, p1, offset) => {
                               const before = rest.substring(0, offset);
                               const proxiesIdx = before.lastIndexOf('proxies:');
                               const urlIdx = before.lastIndexOf('url:');
                               const bracketOpen = before.lastIndexOf('[');
                               const bracketClose = before.lastIndexOf(']');
                               if (proxiesIdx !== -1 && bracketOpen > proxiesIdx && (bracketClose === -1 || bracketOpen > bracketClose)) return m;
                               if (urlIdx !== -1 && offset > urlIdx) return m;
                               return `<span class="highlight-number">${p1}</span>`;
                             });
      return `<span class="highlight-dash">${esc.substring(0, esc.indexOf('-') + 1)}</span>${styledRest}`;
    }
    return `<span>${esc}</span>`;
  }).join('\n');
}

function parseSubscription(content) {
  const m = content.match(/proxies:\s*\n/);
  if (!m) throw new Error('未找到 proxies 字段');
  const start = m.index + m[0].length;
  const gm = content.match(/proxy-groups:\s*\n/);
  const end = gm ? gm.index : content.length;
  let section = content.substring(start, end);
  // 清理末尾可能残留的 proxy-groups: 或其他非节点内容
  section = section.replace(/\s*proxy-groups:.*$/i, '').trim();
  const proxies = [], names = [];
  const lines = section.split('\n');
  let cur = '', brace = 0, inP = false;
  for (const line of lines) {
    if (line.match(/^\s*-\s*\{/)) {
      if (inP && cur) { push(cur, proxies, names); }
      cur = line.trim(); brace = (line.match(/\{/g)||[]).length - (line.match(/\}/g)||[]).length; inP = true;
    } else if (inP) {
      cur += ' ' + line.trim();
      brace += (line.match(/\{/g)||[]).length - (line.match(/\}/g)||[]).length;
      if (brace === 0) { push(cur, proxies, names); cur = ''; inP = false; }
    }
  }
  if (inP && cur) push(cur, proxies, names);
  if (!names.length) throw new Error('未找到任何节点');
  return { nodeNames: names, proxies: proxies.map(p => '    ' + (p.startsWith('-') ? p : '- ' + p)) };
}

function push(proxy, proxies, names) {
  proxies.push(proxy);
  const m = proxy.match(/name:\s*['"]?([^,'"}]+)['"]?/);
  if (m) names.push(m[1].trim().replace(/^['"]|['"]$/g,''));
}

function processContent(content) {
  try {
    const { nodeNames, proxies } = parseSubscription(content);
    parsedNodeNames = nodeNames; parsedProxies = proxies;
    refreshActiveCountryGroups();
    setStatus(`解析成功 — 找到 ${nodeNames.length} 个节点`, 'success');
    renderNodeList(); renderGroupConfig(); updateOutput();
  } catch(e) {
    setStatus(e.message, 'error');
    parsedNodeNames = []; parsedProxies = [];
    activeCountryGroups.clear();
    renderNodeList(); updateOutput();
  }
}

async function fetchFromUrl(url) {
  setStatus('正在获取订阅内容...', 'info');
  const proxyUrls = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`
  ];
  for (const p of proxyUrls) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 15000);
      const res = await fetch(p, { signal: ctrl.signal });
      clearTimeout(tid);
      if (res.ok) { processContent(await res.text()); return; }
    } catch(e) {}
  }
  setStatus('获取失败，请手动粘贴内容', 'error');
}

// 事件绑定
document.getElementById('fetchBtn').addEventListener('click', () => {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { setStatus('请输入订阅链接', 'error'); return; }
  fetchFromUrl(url);
});
document.getElementById('useManualBtn').addEventListener('click', () => {
  const c = document.getElementById('manualInput').value.trim();
  if (!c) { setStatus('请粘贴订阅内容', 'error'); return; }
  processContent(c);
});
document.getElementById('copyBtn').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(generateConfig()); setStatus('已复制到剪贴板', 'success'); }
  catch(e) { setStatus('复制失败', 'error'); }
});
document.getElementById('dlBtn').addEventListener('click', () => {
  const b = new Blob([generateConfig()], { type: 'text/yaml' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(b), download: 'config.yaml' });
  a.click(); URL.revokeObjectURL(a.href);
  setStatus('配置文件已下载', 'success');
});
document.getElementById('clearBtn').addEventListener('click', () => {
  parsedNodeNames = []; parsedProxies = [];
  document.getElementById('outputCode').innerHTML = '<span style="color:var(--text3);font-style:italic">等待处理...</span>';
  renderNodeList(); setStatus('已清空', 'info');
});
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  document.getElementById('fsCode').innerHTML = document.getElementById('outputCode').innerHTML;
  document.getElementById('fsOverlay').classList.add('active');
});

// overlay 开关逻辑统一封装
function bindToggle(openId, closeId, overlayId) {
  document.getElementById(openId).addEventListener('click', () =>
    document.getElementById(overlayId).classList.add('active'));
  document.getElementById(closeId).addEventListener('click', () =>
    document.getElementById(overlayId).classList.remove('active'));
}
bindToggle('fullscreenBtn', 'fsCloseBtn', 'fsOverlay');
bindToggle('viewNodesBtn', 'nodeCloseBtn', 'nodeOverlay');

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('fsOverlay').classList.remove('active');
    document.getElementById('nodeOverlay').classList.remove('active');
  }
});

renderGroupConfig();

document.getElementById('generateBtn').addEventListener('click', () => {
  if (!parsedProxies.length) {
    setStatus('请先输入订阅链接或粘贴内容', 'error');
    return;
  }
  updateOutput();
  setStatus('配置已生成', 'success');
});
</script>
</body>
</html>
